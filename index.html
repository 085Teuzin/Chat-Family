<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clone Zap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-header: #202c33;
            --wa-panel: #111b21;
            --wa-border: #222e35;
            --wa-text: #e9edef;
            --wa-muted: #8696a0;
            --wa-incoming: #202c33;
            --wa-outgoing: #005c4b;
        }
        body {
            background-color: var(--wa-bg);
            color: var(--wa-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .wa-header { background-color: var(--wa-header); }
        .wa-panel { background-color: var(--wa-panel); }
        .wa-border { border-color: var(--wa-border); }
        .wa-incoming { background-color: var(--wa-incoming); }
        .wa-outgoing { background-color: var(--wa-outgoing); }
        .text-muted { color: var(--wa-muted); }
        .hide { display: none !important; }
        .chat-bg {
            background-color: #0b141a;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            opacity: 0.06;
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        #floating-pip {
            animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(0, 168, 132, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 168, 132, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 168, 132, 0); }
        }
    </style>
</head>
<body class="h-full w-full overflow-hidden bg-[#0b141a] antialiased select-none flex flex-col justify-between">

    <div id="screen-loading" class="fixed inset-0 bg-[#0b141a] z-50 flex flex-col items-center justify-center p-6">
        <div class="text-[#00a884] text-6xl mb-6 animate-pulse">
            <i class="fab fa-whatsapp"></i>
        </div>
        <div class="w-16 h-1 bg-[#222e35] rounded-full overflow-hidden">
            <div class="h-full bg-[#00a884] w-1/2 rounded-full animate-[loading_1s_infinite_ease-in-out]"></div>
        </div>
        <span class="text-xs text-muted mt-4 tracking-widest uppercase font-medium">Carregando dados...</span>
    </div>
    <style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>

    <div id="screen-auth" class="hide flex-1 flex flex-col items-center justify-center p-6 safe-top safe-bottom">
        <div class="wa-panel w-full max-w-sm p-6 border wa-border rounded-xl flex flex-col items-center text-center shadow-2xl">
            <div class="w-16 h-16 bg-[#00a884] rounded-full flex items-center justify-center text-white text-3xl mb-4">
                <i class="fab fa-whatsapp"></i>
            </div>
            <h1 class="text-xl font-bold mb-1">Entrar no Clone Zap</h1>
            <p class="text-muted text-xs mb-6">Conecte sua conta para acessar suas conversas privadas</p>
            <button id="btn-google-login" class="w-full bg-[#00a884] hover:bg-[#008f70] text-white font-bold text-sm p-3.5 rounded-lg flex items-center justify-center gap-3 transition-all">
                <i class="fab fa-google text-base"></i> Entrar com o Google
            </button>
        </div>
    </div>

    <div id="screen-register" class="hide flex-1 flex flex-col items-center justify-center p-6 safe-top safe-bottom">
        <div class="wa-panel w-full max-w-sm p-6 border wa-border rounded-xl shadow-2xl">
            <h2 class="text-lg font-bold mb-1 text-center">Configurar Perfil</h2>
            <p class="text-muted text-xs mb-5 text-center">Defina seus dados para identificação na rede</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-muted mb-1">Nome de Usuário</label>
                    <input type="text" id="reg-name" placeholder="Seu nome ou apelido" class="w-full p-3 border wa-border bg-[#202c33] text-sm font-medium rounded-lg outline-none focus:border-[#00a884] text-white">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-muted mb-1">Número de Acesso (4 Dígitos)</label>
                    <input type="text" id="reg-number" maxlength="4" placeholder="Ex: 1234" class="w-full p-3 border wa-border bg-[#202c33] text-sm font-bold rounded-lg outline-none focus:border-[#00a884] text-white tracking-widest text-center">
                </div>
                <button id="btn-complete-register" class="w-full bg-[#00a884] hover:bg-[#008f70] text-white font-bold text-sm p-3 rounded-lg transition-all pt-3">
                    Concluir e Abrir Mensagens
                </button>
            </div>
        </div>
    </div>

    <div id="screen-main-list" class="hide flex-1 flex flex-col h-full w-full max-w-xl mx-auto relative wa-panel md:border-x wa-border safe-top safe-bottom">
        <header class="wa-header h-16 px-4 flex items-center justify-between border-b wa-border flex-shrink-0">
            <h1 class="text-xl font-bold text-[#e9edef]">WhatsApp</h1>
            <div class="flex items-center gap-4 relative">
                <img id="main-my-avatar" src="" class="w-9 h-9 rounded-full object-cover border wa-border">
                <button id="btn-main-menu" class="text-muted hover:text-white p-1 text-lg">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
                <div id="dropdown-main" class="hide absolute top-12 right-0 w-44 wa-header border wa-border rounded shadow-xl z-30 py-1 text-sm">
                    <button id="menu-edit-profile" class="w-full text-left px-4 py-2.5 hover:bg-[#111b21]">Editar Perfil</button>
                    <button id="menu-logout" class="w-full text-left px-4 py-2.5 hover:bg-[#111b21] text-red-400">Sair da Conta</button>
                </div>
            </div>
        </header>

        <div id="contacts-stack-list" class="flex-1 overflow-y-auto divide-y wa-border"></div>

        <button id="btn-trigger-add-contact" class="absolute bottom-6 right-6 w-14 h-14 bg-[#00a884] hover:bg-[#008f70] rounded-full flex items-center justify-center text-white text-xl shadow-2xl z-10 transition-transform active:scale-95">
            <i class="fas fa-comment-medical"></i>
        </button>
    </div>

    <div id="screen-private-chat" class="hide flex-1 flex flex-col h-full w-full max-w-xl mx-auto relative wa-panel md:border-x wa-border safe-top safe-bottom">
        <header class="wa-header h-16 px-3 flex items-center justify-between border-b wa-border flex-shrink-0 z-10">
            <div class="flex items-center gap-3 overflow-hidden flex-1">
                <img id="chat-target-avatar" src="" class="w-10 h-10 rounded-full object-cover flex-shrink-0">
                <div class="overflow-hidden flex flex-col">
                    <span id="chat-target-name" class="font-bold text-sm text-[#e9edef] truncate">Contato</span>
                    <span id="chat-target-number" class="text-[10px] text-muted block font-mono">#0000</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3 text-muted text-base">
                <button id="header-btn-call" title="Fazer Chamada de Voz" class="hover:text-white p-1 text-[#00a884]">
                    <i class="fas fa-phone-alt text-sm"></i>
                </button>
                <button id="header-btn-share-contact" title="Compartilhar meu Contato" class="hover:text-white p-1 text-blue-400">
                    <i class="fas fa-user-share text-xs"></i>
                </button>
                <button id="header-btn-edit" title="Editar nome" class="hover:text-white p-1">
                    <i class="fas fa-pen text-xs"></i>
                </button>
                <button id="header-btn-clear" title="Limpar Conversa" class="hover:text-white p-1">
                    <i class="fas fa-broom text-sm"></i>
                </button>
                <button id="header-btn-delete" title="Excluir Contato" class="hover:text-red-400 p-1">
                    <i class="fas fa-trash-alt text-xs"></i>
                </button>
                <span class="text-gray-600 self-center">|</span>
                <button id="header-btn-back" title="Sair da conversa" class="hover:text-white p-1 pl-0.5">
                    <i class="fas fa-door-open text-sm"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 relative overflow-hidden bg-[#0b141a]">
            <div class="absolute inset-0 chat-bg"></div>
            <div id="chat-messages-container" class="absolute inset-0 p-4 overflow-y-auto space-y-2 flex flex-col z-10"></div>
        </div>

        <div class="p-3 bg-[#202c33] flex items-center gap-2 flex-shrink-0 z-10 border-t wa-border pb-4 sm:pb-3">
            <div class="flex-1 bg-[#2a3942] rounded-lg p-2 min-h-[42px] flex items-center shadow-inner">
                <input type="text" id="chat-message-input" placeholder="Digite uma mensagem" class="w-full bg-transparent outline-none px-3 text-sm text-white placeholder:text-[#8696a0]">
            </div>
        </div>
    </div>

    <div id="screen-call" class="hide fixed inset-0 bg-[#0f1c24] z-40 flex flex-col items-center justify-between p-8 safe-top safe-bottom">
        <div class="w-full flex justify-start">
            <button id="btn-call-minimize" class="text-white bg-[#202c33] w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">
                <i class="fas fa-chevron-down"></i>
            </button>
        </div>

        <div class="flex flex-col items-center gap-4 flex-1 justify-center">
            <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-[#00a884] shadow-2xl">
                <img id="call-screen-avatar" src="" class="w-full h-full object-cover">
            </div>
            <h2 id="call-screen-name" class="text-2xl font-bold text-white mt-2">Contato</h2>
            <span id="call-screen-status" class="text-[#00a884] text-sm font-medium tracking-wide animate-pulse">Conectando...</span>
        </div>

        <div class="flex items-center gap-6 pb-12">
            <button id="btn-call-toggle-mic" class="w-14 h-14 bg-[#202c33] text-white rounded-full flex items-center justify-center text-lg shadow-xl active:scale-95 transition-all border border-gray-700">
                <i class="fas fa-microphone"></i>
            </button>
            <button id="btn-call-hangup" class="w-14 h-14 bg-red-600 text-white rounded-full flex items-center justify-center text-lg shadow-xl active:scale-95 transition-transform">
                <i class="fas fa-phone-slash"></i>
            </button>
        </div>
    </div>

    <div id="floating-pip" class="hide fixed bottom-24 right-6 w-16 h-16 bg-[#00a884] rounded-full z-40 cursor-pointer shadow-2xl overflow-hidden border-2 border-white flex items-center justify-center">
        <img id="pip-avatar" src="" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/20 flex items-center justify-center">
            <i class="fas fa-phone text-white text-xs animate-bounce"></i>
        </div>
    </div>

    <div id="modal-add-contact" class="hide fixed inset-0 bg-black/80 z-40 flex items-center justify-center p-4">
        <div class="w-full max-w-xs wa-panel border wa-border p-5 rounded-xl space-y-4 shadow-2xl">
            <h3 class="font-bold text-sm uppercase tracking-wider text-[#00a884]">Adicionar Contato</h3>
            <div class="space-y-3">
                <input type="text" id="add-contact-name" placeholder="Nome do Contato" class="w-full p-2.5 text-xs border wa-border bg-[#202c33] font-medium text-white outline-none rounded-lg">
                <input type="text" id="add-contact-number" maxlength="4" placeholder="Número (4 dígitos)" class="w-full p-2.5 text-xs border wa-border bg-[#202c33] font-bold text-white outline-none rounded-lg text-center tracking-widest">
            </div>
            <div class="flex gap-2 justify-end text-xs font-bold pt-1">
                <button id="btn-cancel-add-contact" class="px-4 py-2 text-muted uppercase">Cancelar</button>
                <button id="btn-save-add-contact" class="px-4 py-2 bg-[#00a884] text-white uppercase rounded-lg">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-edit-profile" class="hide fixed inset-0 bg-black/80 z-40 flex items-center justify-center p-4">
        <div class="w-full max-w-xs wa-panel border wa-border p-5 rounded-xl space-y-4 shadow-2xl">
            <h3 class="font-bold text-sm uppercase tracking-wider text-[#00a884]">Editar Perfil</h3>
            
            <div class="flex flex-col items-center gap-2 pb-2">
                <div class="relative group w-16 h-16 border wa-border rounded-full overflow-hidden">
                    <img id="edit-profile-avatar" src="" class="w-full h-full object-cover">
                    <label for="upload-profile-avatar" class="absolute inset-0 bg-black/60 flex items-center justify-center text-white cursor-pointer text-xs">
                        <i class="fas fa-camera"></i>
                    </label>
                    <input type="file" id="upload-profile-avatar" accept="image/*" class="hidden">
                </div>
                <span class="text-[10px] text-muted">Toque na foto para alterar</span>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-muted mb-1">Nome de Exibição</label>
                    <input type="text" id="edit-profile-name" class="w-full p-2.5 text-xs border wa-border bg-[#202c33] font-medium text-white outline-none rounded-lg">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-muted mb-1">Número Identificador (Fixo)</label>
                    <input type="text" id="edit-profile-number" readonly class="w-full p-2.5 text-xs border wa-border bg-[#111b21] font-mono text-center tracking-widest text-muted outline-none rounded-lg">
                </div>
            </div>
            <div class="flex gap-2 justify-end text-xs font-bold pt-1">
                <button id="btn-cancel-edit-profile" class="px-4 py-2 text-muted uppercase">Fechar</button>
                <button id="btn-save-edit-profile" class="px-4 py-2 bg-[#00a884] text-white uppercase rounded-lg">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-edit-contact" class="hide fixed inset-0 bg-black/80 z-40 flex items-center justify-center p-4">
        <div class="w-full max-w-xs wa-panel border wa-border p-5 rounded-xl space-y-4 shadow-2xl">
            <h3 class="font-bold text-sm uppercase tracking-wider text-[#00a884]">Editar Contato</h3>
            <input type="text" id="edit-contact-name" placeholder="Apelido do contato" class="w-full p-2.5 text-xs border wa-border bg-[#202c33] font-medium text-white outline-none rounded-lg">
            <div class="flex gap-2 justify-end text-xs font-bold pt-1">
                <button id="btn-cancel-edit-contact" class="px-4 py-2 text-muted uppercase">Cancelar</button>
                <button id="btn-save-edit-contact" class="px-4 py-2 bg-[#00a884] text-white uppercase rounded-lg">Salvar</button>
            </div>
        </div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, get, child, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb",
            measurementId: "G-TLJ87EYNFP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let myAccountData = null;
        let selectedContactUid = null;
        let selectedContactData = null;
        let currentActiveChatId = null;
        let unsubChatMessages = null;
        let unsubContactsList = null;
        let unsubCallSignals = null;

        let localStream = null;
        let peerConnection = null;
        let isMuted = false;
        let activeCallData = null;

        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        const scrLoading = document.getElementById("screen-loading");
        const scrAuth = document.getElementById("screen-auth");
        const scrRegister = document.getElementById("screen-register");
        const scrMainList = document.getElementById("screen-main-list");
        const scrPrivateChat = document.getElementById("screen-private-chat");
        const scrCall = document.getElementById("screen-call");
        const floatingPip = document.getElementById("floating-pip");

        const btnGoogleLogin = document.getElementById("btn-google-login");
        const inputRegName = document.getElementById("reg-name");
        const inputRegNumber = document.getElementById("reg-number");
        const btnCompleteRegister = document.getElementById("btn-complete-register");

        const imgMainMyAvatar = document.getElementById("main-my-avatar");
        const btnMainMenu = document.getElementById("btn-main-menu");
        const dropdownMain = document.getElementById("dropdown-main");
        const menuEditProfile = document.getElementById("menu-edit-profile");
        const menuLogout = document.getElementById("menu-logout");
        const contactsStackList = document.getElementById("contacts-stack-list");
        const btnTriggerAddContact = document.getElementById("btn-trigger-add-contact");

        const imgChatTargetAvatar = document.getElementById("chat-target-avatar");
        const txtChatTargetName = document.getElementById("chat-target-name");
        const txtChatTargetNumber = document.getElementById("chat-target-number");
        const chatMessagesContainer = document.getElementById("chat-messages-container");
        const inputChatMessage = document.getElementById("chat-message-input");

        const headerBtnCall = document.getElementById("header-btn-call");
        const headerBtnShareContact = document.getElementById("header-btn-share-contact");
        const headerBtnEdit = document.getElementById("header-btn-edit");
        const headerBtnClear = document.getElementById("header-btn-clear");
        const headerBtnDelete = document.getElementById("header-btn-delete");
        const headerBtnBack = document.getElementById("header-btn-back");

        const callScreenAvatar = document.getElementById("call-screen-avatar");
        const callScreenName = document.getElementById("call-screen-name");
        const callScreenStatus = document.getElementById("call-screen-status");
        const btnCallMinimize = document.getElementById("btn-call-minimize");
        const btnCallToggleMic = document.getElementById("btn-call-toggle-mic");
        const btnCallHangup = document.getElementById("btn-call-hangup");
        const pipAvatar = document.getElementById("pip-avatar");
        const remoteAudio = document.getElementById("remote-audio");

        const modalAddContact = document.getElementById("modal-add-contact");
        const inputAddContactName = document.getElementById("add-contact-name");
        const inputAddContactNumber = document.getElementById("add-contact-number");
        const btnCancelAddContact = document.getElementById("btn-cancel-add-contact");
        const btnSaveAddContact = document.getElementById("btn-save-add-contact");

        const modalEditProfile = document.getElementById("modal-edit-profile");
        const imgEditProfileAvatar = document.getElementById("edit-profile-avatar");
        const uploadProfileAvatar = document.getElementById("upload-profile-avatar");
        const inputEditProfileName = document.getElementById("edit-profile-name");
        const inputEditProfileNumber = document.getElementById("edit-profile-number");
        const btnCancelEditProfile = document.getElementById("btn-cancel-edit-profile");
        const btnSaveEditProfile = document.getElementById("btn-save-edit-profile");

        const modalEditContact = document.getElementById("modal-edit-contact");
        const inputEditContactName = document.getElementById("edit-contact-name");
        const btnCancelEditContact = document.getElementById("btn-cancel-edit-contact");
        const btnSaveEditContact = document.getElementById("btn-save-edit-contact");

        function showLoading() { scrLoading.classList.remove("hide"); }
        function hideLoading() { scrLoading.classList.add("hide"); }

        onAuthStateChanged(auth, async (user) => {
            showLoading();
            if (user) {
                const snapshot = await get(ref(db, `clone_zap/users/${user.uid}`));
                if (snapshot.exists()) {
                    myAccountData = snapshot.val();
                    showScreen("main-list");
                    bindContactsRealtime();
                    listenIncomingCalls();
                } else {
                    showScreen("register");
                }
            } else {
                showScreen("auth");
            }
            hideLoading();
        });

        btnGoogleLogin.addEventListener("click", async () => {
            showLoading();
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                alert("Erro no login: " + err.message);
                hideLoading();
            }
        });

        btnCompleteRegister.addEventListener("click", async () => {
            const name = inputRegName.value.trim();
            const num = inputRegNumber.value.trim();
            if (!name || num.length !== 4 || isNaN(num)) {
                return alert("Insira um nome válido e um número de 4 dígitos!");
            }
            showLoading();
            const user = auth.currentUser;
            myAccountData = {
                uid: user.uid,
                name: name,
                number: num,
                avatar: user.photoURL || "https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?w=150&h=150&fit=crop"
            };
            await set(ref(db, `clone_zap/users/${user.uid}`), myAccountData);
            await set(ref(db, `clone_zap/directory/${num}`), user.uid);
            showScreen("main-list");
            bindContactsRealtime();
            listenIncomingCalls();
            hideLoading();
        });

        function showScreen(screen) {
            scrAuth.classList.add("hide");
            scrRegister.classList.add("hide");
            scrMainList.classList.add("hide");
            scrPrivateChat.classList.add("hide");
            scrCall.classList.add("hide");
            if (screen === "auth") scrAuth.classList.remove("hide");
            if (screen === "register") scrRegister.classList.remove("hide");
            if (screen === "main-list") {
                scrMainList.classList.remove("hide");
                imgMainMyAvatar.src = myAccountData.avatar;
            }
            if (screen === "private-chat") scrPrivateChat.classList.remove("hide");
            if (screen === "call") scrCall.classList.remove("hide");
        }

        btnMainMenu.addEventListener("click", (e) => {
            e.stopPropagation();
            dropdownMain.classList.toggle("hide");
        });
        document.addEventListener("click", () => { dropdownMain.classList.add("hide"); });

        menuLogout.addEventListener("click", () => {
            showLoading();
            if(unsubContactsList) unsubContactsList();
            if(unsubChatMessages) unsubChatMessages();
            if(unsubCallSignals) unsubCallSignals();
            signOut(auth);
        });

        menuEditProfile.addEventListener("click", () => {
            imgEditProfileAvatar.src = myAccountData.avatar;
            inputEditProfileName.value = myAccountData.name;
            inputEditProfileNumber.value = myAccountData.number;
            modalEditProfile.classList.remove("hide");
        });
        btnCancelEditProfile.addEventListener("click", () => modalEditProfile.classList.add("hide"));

        uploadProfileAvatar.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onloadend = () => { imgEditProfileAvatar.src = reader.result; };
            reader.readAsDataURL(file);
        });

        btnSaveEditProfile.addEventListener("click", async () => {
            const newName = inputEditProfileName.value.trim();
            if (!newName) return alert("O nome não pode ser vazio!");
            showLoading();
            myAccountData.name = newName;
            myAccountData.avatar = imgEditProfileAvatar.src;
            await update(ref(db, `clone_zap/users/${myAccountData.uid}`), {
                name: newName,
                avatar: myAccountData.avatar
            });
            imgMainMyAvatar.src = myAccountData.avatar;
            modalEditProfile.classList.add("hide");
            hideLoading();
        });

        btnTriggerAddContact.addEventListener("click", () => {
            inputAddContactName.value = "";
            inputAddContactNumber.value = "";
            modalAddContact.classList.remove("hide");
        });
        btnCancelAddContact.addEventListener("click", () => modalAddContact.classList.add("hide"));

        btnSaveAddContact.addEventListener("click", async () => {
            const contactName = inputAddContactName.value.trim();
            const contactNum = inputAddContactNumber.value.trim();
            if (!contactName || contactNum.length !== 4) {
                return alert("Preencha o nome e o número de 4 dígitos corretamente!");
            }
            if (contactNum === myAccountData.number) {
                return alert("Você não pode adicionar seu próprio número!");
            }
            showLoading();
            const dirSnap = await get(ref(db, `clone_zap/directory/${contactNum}`));
            if (!dirSnap.exists()) {
                hideLoading();
                return alert("Nenhum usuário encontrado com esse número no Clone Zap!");
            }
            const targetUid = dirSnap.val();
            await set(ref(db, `clone_zap/contacts/${myAccountData.uid}/${targetUid}`), {
                uid: targetUid,
                savedName: contactName,
                number: contactNum
            });
            modalAddContact.classList.add("hide");
            hideLoading();
        });

        function bindContactsRealtime() {
            if (unsubContactsList) unsubContactsList();
            unsubContactsList = onValue(ref(db, `clone_zap/contacts/${myAccountData.uid}`), async (snapshot) => {
                contactsStackList.innerHTML = "";
                if (!snapshot.exists()) return;
                const contacts = snapshot.val();
                for (const targetUid of Object.keys(contacts)) {
                    const cInfo = contacts[targetUid];
                    const profileSnap = await get(ref(db, `clone_zap/users/${targetUid}`));
                    let dynamicAvatar = "https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?w=150&h=150&fit=crop";
                    if (profileSnap.exists()) {
                        dynamicAvatar = profileSnap.val().avatar;
                    }
                    const chatID = myAccountData.uid < targetUid ? `${myAccountData.uid}_${targetUid}` : `${targetUid}_${myAccountData.uid}`;
                    const lastMsgSnap = await get(ref(db, `clone_zap/chats/${chatID}`));
                    let textPreview = "Nenhuma mensagem trocada";
                    if (lastMsgSnap.exists()) {
                        const msgs = Object.values(lastMsgSnap.val());
                        if (msgs.length > 0) {
                            textPreview = msgs[msgs.length - 1].text;
                        }
                    }
                    const block = document.createElement("div");
                    block.className = "flex items-center gap-3 p-3 cursor-pointer hover:bg-[#202c33] transition-all";
                    block.innerHTML = `
                        <img src="${dynamicAvatar}" class="w-12 h-12 rounded-full object-cover flex-shrink-0">
                        <div class="flex-1 overflow-hidden">
                            <div class="flex justify-between items-baseline">
                                <h4 class="font-bold text-sm text-[#e9edef] truncate">${cInfo.savedName}</h4>
                                <span class="text-[10px] text-muted font-mono">#${cInfo.number}</span>
                            </div>
                            <p class="text-xs text-muted truncate mt-0.5">${textPreview}</p>
                        </div>
                    `;
                    block.addEventListener("click", () => {
                        showLoading();
                        openChatWith(targetUid, cInfo.savedName, cInfo.number, dynamicAvatar);
                    });
                    contactsStackList.appendChild(block);
                }
            });
        }

        function openChatWith(targetUid, savedName, number, avatar) {
            selectedContactUid = targetUid;
            selectedContactData = { uid: targetUid, savedName: savedName, number: number, avatar: avatar };
            currentActiveChatId = myAccountData.uid < targetUid ? `${myAccountData.uid}_${targetUid}` : `${targetUid}_${myAccountData.uid}`;
            imgChatTargetAvatar.src = avatar;
            txtChatTargetName.innerText = savedName;
            txtChatTargetNumber.innerText = `#${number}`;
            showScreen("private-chat");
            listenChatMessages();
        }

        headerBtnBack.addEventListener("click", () => {
            showLoading();
            if (unsubChatMessages) unsubChatMessages();
            showScreen("main-list");
            bindContactsRealtime();
            hideLoading();
        });

        function listenChatMessages() {
            if (unsubChatMessages) unsubChatMessages();
            unsubChatMessages = onValue(ref(db, `clone_zap/chats/${currentActiveChatId}`), (snapshot) => {
                chatMessagesContainer.innerHTML = "";
                if (snapshot.exists()) {
                    const messages = snapshot.val();
                    Object.values(messages).forEach(m => {
                        const isMe = m.senderId === myAccountData.uid;
                        const container = document.createElement("div");
                        
                        if (m.isContactShare) {
                            container.className = `max-w-[75%] rounded-lg p-3 text-xs relative shadow-sm break-words ${isMe ? "wa-outgoing self-end rounded-tr-none" : "wa-incoming self-start rounded-tl-none"} border border-[#222e35]`;
                            container.innerHTML = `
                                <div class="flex items-center gap-3 bg-[#111b21] p-2.5 rounded-lg mb-1 border wa-border cursor-pointer active:scale-95 transition-transform" id="msg-card-${m.time.replace(':','')}">
                                    <div class="w-9 h-9 rounded-full bg-[#00a884] flex items-center justify-center text-white text-sm"><i class="fas fa-user"></i></div>
                                    <div class="overflow-hidden flex flex-col">
                                        <span class="font-bold text-white text-xs truncate">${m.contactName}</span>
                                        <span class="text-[10px] text-muted font-mono">#${m.contactNumber}</span>
                                    </div>
                                </div>
                                <p class="text-[#00a884] font-bold text-[11px] uppercase tracking-wider mt-1 text-center">Adicionar Contato</p>
                                <span class="absolute bottom-1 right-1.5 text-[9px] text-muted font-medium">${m.time}</span>
                            `;
                            chatMessagesContainer.appendChild(container);
                            
                            document.getElementById(`msg-card-${m.time.replace(':','')}`).addEventListener("click", () => {
                                if (m.senderId === myAccountData.uid) return;
                                inputAddContactName.value = m.contactName;
                                inputAddContactNumber.value = m.contactNumber;
                                modalAddContact.classList.remove("hide");
                            });
                        } else {
                            container.className = `max-w-[75%] rounded-lg p-2 px-3 text-xs relative shadow-sm break-words ${isMe ? "wa-outgoing self-end rounded-tr-none" : "wa-incoming self-start rounded-tl-none"}`;
                            container.innerHTML = `
                                <p class="text-white text-[13px] leading-relaxed pr-8">${m.text}</p>
                                <span class="absolute bottom-1 right-1.5 text-[9px] text-muted font-medium">${m.time}</span>
                            `;
                            chatMessagesContainer.appendChild(container);
                        }
                    });
                    chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
                }
                hideLoading();
            });
        }

        async function sendPushMessage(payload) {
            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const msgRef = push(ref(db, `clone_zap/chats/${currentActiveChatId}`));
            await set(msgRef, {
                senderId: myAccountData.uid,
                time: timeStr,
                ...payload
            });
        }

        inputChatMessage.addEventListener("keydown", async (e) => {
            if (e.key === "Enter") {
                const text = inputChatMessage.value.trim();
                if (!text) return;
                inputChatMessage.value = "";
                await sendPushMessage({ text: text });
            }
        });

        headerBtnShareContact.addEventListener("click", async () => {
            await sendPushMessage({
                isContactShare: true,
                contactName: myAccountData.name,
                contactNumber: myAccountData.number,
                text: `Contato de ${myAccountData.name} #${myAccountData.number}`
            });
        });

        headerBtnEdit.addEventListener("click", () => {
            inputEditContactName.value = txtChatTargetName.innerText;
            modalEditContact.classList.remove("hide");
        });
        btnCancelEditContact.addEventListener("click", () => modalEditContact.classList.add("hide"));

        btnSaveEditContact.addEventListener("click", async () => {
            const updatedName = inputEditContactName.value.trim();
            if (!updatedName) return alert("O nome não pode ser vazio!");
            showLoading();
            await update(ref(db, `clone_zap/contacts/${myAccountData.uid}/${selectedContactUid}`), {
                savedName: updatedName
            });
            txtChatTargetName.innerText = updatedName;
            if(selectedContactData) selectedContactData.savedName = updatedName;
            modalEditContact.classList.add("hide");
            hideLoading();
        });

        headerBtnClear.addEventListener("click", async () => {
            if (confirm("Deseja apagar o histórico dessa conversa para ambos?")) {
                showLoading();
                await remove(ref(db, `clone_zap/chats/${currentActiveChatId}`));
                hideLoading();
            }
        });

        headerBtnDelete.addEventListener("click", async () => {
            if (confirm("Deseja excluir este contato da sua lista?")) {
                showLoading();
                if (unsubChatMessages) unsubChatMessages();
                await remove(ref(db, `clone_zap/contacts/${myAccountData.uid}/${selectedContactUid}`));
                showScreen("main-list");
                bindContactsRealtime();
                hideLoading();
            }
        });

        async function setupMediaStream() {
            if (!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            }
        }

        function initPeerConnection(targetUid) {
            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (event) => {
                if (event.streams && event.streams[0]) {
                    remoteAudio.srcObject = event.streams[0];
                    callScreenStatus.innerText = "Em chamada";
                }
            };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    push(ref(db, `clone_zap/calls/${targetUid}/candidates`), {
                        candidate: event.candidate.toJSON(),
                        sender: myAccountData.uid
                    });
                }
            };
        }

        headerBtnCall.addEventListener("click", async () => {
            showLoading();
            try {
                await setupMediaStream();
                activeCallData = {
                    roomID: currentActiveChatId,
                    targetUid: selectedContactUid,
                    name: selectedContactData.savedName,
                    avatar: selectedContactData.avatar
                };
                
                callScreenAvatar.src = activeCallData.avatar;
                pipAvatar.src = activeCallData.avatar;
                callScreenName.innerText = activeCallData.name;
                callScreenStatus.innerText = "Chamando...";
                
                showScreen("call");
                hideLoading();

                initPeerConnection(selectedContactUid);
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                await set(ref(db, `clone_zap/calls/${selectedContactUid}/setup`), {
                    offer: { type: offer.type, sdp: offer.sdp },
                    callerId: myAccountData.uid,
                    callerName: myAccountData.name,
                    callerAvatar: myAccountData.avatar,
                    callerNumber: myAccountData.number,
                    roomID: currentActiveChatId
                });
            } catch (err) {
                hideLoading();
                alert("Erro ao acessar microfone: " + err.message);
            }
        });

        function listenIncomingCalls() {
            if (unsubCallSignals) unsubCallSignals();
            unsubCallSignals = onValue(ref(db, `clone_zap/calls/${myAccountData.uid}/setup`), async (snapshot) => {
                if (!snapshot.exists()) {
                    if (activeCallData) endCallSession(false);
                    return;
                }
                const session = snapshot.val();
                if (activeCallData) return;

                activeCallData = {
                    roomID: session.roomID,
                    targetUid: session.callerId,
                    name: session.callerName,
                    avatar: session.callerAvatar
                };

                callScreenAvatar.src = activeCallData.avatar;
                pipAvatar.src = activeCallData.avatar;
                callScreenName.innerText = activeCallData.name;
                callScreenStatus.innerText = "Conectando...";
                showScreen("call");

                await setupMediaStream();
                initPeerConnection(session.callerId);

                await peerConnection.setRemoteDescription(new RTCSessionDescription(session.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                await set(ref(db, `clone_zap/calls/${session.callerId}/answer`), {
                    type: answer.type,
                    sdp: answer.sdp
                });

                onValue(ref(db, `clone_zap/calls/${myAccountData.uid}/candidates`), (candSnap) => {
                    if (candSnap.exists()) {
                        Object.values(candSnap.val()).forEach(async (c) => {
                            if (c.sender !== myAccountData.uid) {
                                try { await peerConnection.addIceCandidate(new RTCIceCandidate(c.candidate)); } catch(e){}
                            }
                        });
                    }
                });
            });

            onValue(ref(db, `clone_zap/calls/${myAccountData.uid}/answer`), async (snapshot) => {
                if (snapshot.exists() && peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(snapshot.val()));
                    onValue(ref(db, `clone_zap/calls/${activeCallData.targetUid}/candidates`), (candSnap) => {
                        if (candSnap.exists()) {
                            Object.values(candSnap.val()).forEach(async (c) => {
                                if (c.sender !== myAccountData.uid) {
                                    try { await peerConnection.addIceCandidate(new RTCIceCandidate(c.candidate)); } catch(e){}
                                }
                            });
                        }
                    });
                }
            });
        }

        function endCallSession(notifyRemote = true) {
            if (notifyRemote && activeCallData) {
                remove(ref(db, `clone_zap/calls/${activeCallData.targetUid}`));
                remove(ref(db, `clone_zap/calls/${myAccountData.uid}`));
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            remoteAudio.srcObject = null;
            activeCallData = null;
            isMuted = false;
            btnCallToggleMic.className = "w-14 h-14 bg-[#202c33] text-white rounded-full flex items-center justify-center text-lg shadow-xl active:scale-95 transition-all border border-gray-700";
            btnCallToggleMic.innerHTML = `<i class="fas fa-microphone"></i>`;
            
            scrCall.classList.add("hide");
            floatingPip.classList.add("hide");
            if (selectedContactUid) {
                showScreen("private-chat");
            } else {
                showScreen("main-list");
            }
        }

        btnCallHangup.addEventListener("click", () => endCallSession(true));

        btnCallToggleMic.addEventListener("click", () => {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
            if (isMuted) {
                btnCallToggleMic.className = "w-14 h-14 bg-red-600/80 text-white rounded-full flex items-center justify-center text-lg shadow-xl active:scale-95 transition-all";
                btnCallToggleMic.innerHTML = `<i class="fas fa-microphone-slash"></i>`;
            } else {
                btnCallToggleMic.className = "w-14 h-14 bg-[#202c33] text-white rounded-full flex items-center justify-center text-lg shadow-xl active:scale-95 transition-all border border-gray-700";
                btnCallToggleMic.innerHTML = `<i class="fas fa-microphone"></i>`;
            }
        });

        btnCallMinimize.addEventListener("click", () => {
            scrCall.classList.add("hide");
            floatingPip.classList.remove("hide");
            if (selectedContactUid) {
                showScreen("private-chat");
            } else {
                showScreen("main-list");
            }
        });

        floatingPip.addEventListener("click", () => {
            floatingPip.classList.add("hide");
            showScreen("call");
        });
    </script>
</body>
</html>
