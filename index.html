<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Família Web App</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithRedirect, 
            onAuthStateChanged, 
            GoogleAuthProvider,
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            getDoc, 
            updateDoc, 
            collection, 
            addDoc, 
            onSnapshot, 
            orderBy, 
            query, 
            deleteDoc, 
            getDocs, 
            writeBatch,
            serverTimestamp,
            deleteField
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb",
            measurementId: "G-TLJ87EYNFP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseCtx = { auth, db, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged, signOut, doc, setDoc, getDoc, updateDoc, collection, addDoc, onSnapshot, orderBy, query, deleteDoc, getDocs, writeBatch, serverTimestamp, deleteField };
    </script>

    <style>
        .theme-dark {
            --bg-main: #000000;
            --bg-surface: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            --msg-me: #056162;
            --msg-other: #262626;
            --primary: #4caf50;
            --danger: #d32f2f;
        }

        .theme-light {
            --bg-main: #f0f2f5;
            --bg-surface: #ffffff;
            --bg-card: #f8f9fa;
            --text-main: #000000;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --msg-me: #d9fdd3;
            --msg-other: #ffffff;
            --primary: #25d366;
            --danger: #e53935;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
            background-color: var(--bg-main);
        }

        .screen.active {
            display: flex;
        }

        .auth-container {
            margin: auto;
            width: 85%;
            max-width: 340px;
            padding: 25px;
            background-color: var(--bg-surface);
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .auth-container h1 { 
            font-size: 24px; 
            font-weight: 600; 
            margin-bottom: 5px; 
            letter-spacing: -0.5px;
        }

        .credits {
            position: absolute;
            bottom: -40px;
            left: 0;
            width: 100%;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            opacity: 0.6;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        .btn-primary { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-primary:disabled { background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed; opacity: 0.5; }
        .btn-secondary { width: 100%; padding: 10px; background-color: var(--border-color); color: var(--text-main); border: none; border-radius: 6px; margin-top: 10px; cursor: pointer;}
        .btn-danger { width: 100%; padding: 10px; background-color: var(--danger); color: white; border: none; border-radius: 6px; margin-top: 10px; font-weight: bold; cursor: pointer;}
        .btn-icon { background: none; border: none; color: var(--text-main); font-size: 24px; cursor: pointer; padding: 0 10px; }

        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
        }

        .room-info-header { flex: 1; margin-left: 15px; cursor: pointer; }
        .room-info-header span { display: block; }
        #chat-room-status { font-size: 12px; color: var(--text-muted); }

        .avatar { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; object-fit: cover; }
        .large-avatar { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-block {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            position: relative;
            word-wrap: break-word;
            font-size: 15px;
            cursor: pointer;
        }

        .msg-block.me { background-color: var(--msg-me); align-self: flex-end; border-top-right-radius: 2px; }
        .msg-block.other { background-color: var(--msg-other); align-self: flex-start; border-top-left-radius: 2px; border: 1px solid var(--border-color); }

        .msg-author { font-size: 11px; font-weight: bold; color: var(--primary); display: block; margin-bottom: 3px; }
        .msg-text { display: block; }
        .msg-time { font-size: 10px; color: var(--text-muted); text-align: right; display: block; margin-top: 4px; }

        .msg-quoted {
            background: rgba(0,0,0,0.15);
            border-left: 3px solid var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            background-color: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            gap: 10px;
        }

        .chat-input-area input { flex: 1; margin-bottom: 0; }
        .btn-send { background-color: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .reply-zone {
            background-color: var(--bg-surface);
            padding: 8px 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
        }
        .reply-content { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        #btn-cancel-reply { background: none; border: none; color: var(--text-main); font-size: 16px; cursor: pointer; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background-color: var(--bg-surface);
            padding: 25px;
            border-radius: 12px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .close-modal { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 18px; }
        .list-container { max-height: 200px; overflow-y: auto; margin-top: 15px; text-align: left; }
        .participant-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-color); }

        .context-menu {
            display: none;
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background-color: var(--bg-surface);
            border-top-left-radius: 16px; border-top-right-radius: 16px;
            padding: 15px; box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
            z-index: 200;
            gap: 10px; flex-direction: column;
        }

        .context-menu button {
            width: 100%; padding: 14px; background-color: var(--bg-card); color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 8px; font-size: 16px; cursor: pointer;
        }
        .context-menu #menu-delete { color: var(--danger); }
    </style>
</head>
<body class="theme-dark">

    <div id="screen-login" class="screen active">
        <div class="auth-container">
            <h1>Família Chat</h1>
            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px;">Insira seus dados e a sala para se conectar</p>
            
            <input type="text" id="input-login-name" placeholder="Como quer ser chamado?">
            <input type="text" id="room-name" placeholder="Nome da sala...">
            <input type="password" id="room-pass" placeholder="Senha da sala...">
            
            <button id="btn-google-login" class="btn-primary" disabled>Entrar com o Google e Acessar Sala</button>
            <div class="credits">Made By: @085_Teuzinnn</div>
        </div>
    </div>

    <div id="screen-chat" class="screen">
        <div class="header-bar">
            <button id="btn-leave-room" class="btn-icon">🚪</button>
            <div class="room-info-header" id="btn-room-details">
                <span id="chat-room-title" style="font-weight: bold;">Nome da Sala</span>
                <span id="chat-room-status">Clique para ver membros</span>
            </div>
            <img id="user-avatar-chat" class="avatar" alt="Perfil">
        </div>

        <div id="chat-messages" class="messages-container"></div>

        <div id="message-menu" class="context-menu">
            <button id="menu-reply">Responder</button>
            <button id="menu-edit">Editar</button>
            <button id="menu-delete">Apagar para todos</button>
            <button id="menu-cancel">Cancelar</button>
        </div>

        <div id="reply-preview" class="reply-zone" style="display: none;">
            <div class="reply-content">
                <small>Respondendo a <span id="reply-user"></span></small>
                <p id="reply-text"></p>
            </div>
            <button id="btn-cancel-reply">✕</button>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Digite sua mensagem...">
            <button id="btn-send" class="btn-send">Enviar</button>
        </div>
    </div>

    <div id="modal-profile" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-profile">✕</span>
            <img id="modal-user-img" class="large-avatar" alt="Foto">
            <h3 id="modal-user-name">Nome do Usuário</h3>
            <p id="modal-user-email">email@gmail.com</p>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid var(--border-color);">
            <button id="btn-toggle-theme" class="btn-secondary">Alternar Tema (Claro/Escuro)</button>
            <button id="btn-logout" class="btn-danger">Sair da Conta</button>
        </div>
    </div>

    <div id="modal-room" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-room">✕</span>
            <h3 id="info-room-name">Sala</h3>
            
            <div id="adm-controls" style="display: none; margin-top: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
                <h4 style="margin-bottom: 10px; color: var(--primary);">Painel do Administrador</h4>
                <input type="text" id="new-room-name" placeholder="Mudar nome visual da sala">
                <button id="btn-rename-room" class="btn-secondary">Salvar Novo Nome</button>
                <button id="btn-clear-chat" class="btn-danger">Limpar Toda a Conversa</button>
            </div>

            <h4 style="margin-top: 15px;">Participantes na Sala</h4>
            <div id="participants-list" class="list-container"></div>
        </div>
    </div>

    <script type="module">
        const interval = setInterval(() => {
            if (window.firebaseCtx) {
                clearInterval(interval);
                initApp();
            }
        }, 50);

        function initApp() {
            const { 
                auth, db, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged, signOut,
                doc, setDoc, getDoc, updateDoc, collection, addDoc, onSnapshot, orderBy, query, deleteDoc, getDocs, writeBatch, serverTimestamp, deleteField
            } = window.firebaseCtx;

            let currentUser = null;
            let currentRoomId = null;
            let currentRoomAdmin = null;
            let selectedMessageId = null; 
            let replyMessageData = null; 
            let unsubscribeMessages = null;
            let unsubscribeRoom = null;
            let authProcessed = false;

            const screens = {
                login: document.getElementById('screen-login'),
                chat: document.getElementById('screen-chat')
            };

            const loginNameInput = document.getElementById('input-login-name');
            const roomNameInput = document.getElementById('room-name');
            const roomPassInput = document.getElementById('room-pass');
            const googleLoginBtn = document.getElementById('btn-google-login');

            function validateInputs() {
                const nameVal = loginNameInput.value.trim();
                const roomVal = roomNameInput.value.trim();
                const passVal = roomPassInput.value.trim();
                googleLoginBtn.disabled = (nameVal === '' || roomVal === '' || passVal === '');
            }

            loginNameInput.addEventListener('input', validateInputs);
            roomNameInput.addEventListener('input', validateInputs);
            roomPassInput.addEventListener('input', validateInputs);

            function showScreen(screenKey) {
                Object.keys(screens).forEach(key => {
                    screens[key].classList.toggle('active', key === screenKey);
                });
            }

            async function processUserLogin(user) {
                if (authProcessed) {
                    console.log("Fluxo de login já processado nesta instância. Ignorando duplicata.");
                    return;
                }
                authProcessed = true;
                console.log("Iniciando validação de usuário:", user.uid);

                currentUser = user;
                let finalName = localStorage.getItem('pending_display_name') || localStorage.getItem('chat_display_name');

                if (!finalName) {
                    try {
                        const userDoc = await getDoc(doc(db, 'users', user.uid));
                        if (userDoc.exists() && userDoc.data().displayName) {
                            finalName = userDoc.data().displayName;
                        }
                    } catch (e) {
                        console.error("Erro ao buscar dados do usuário no Firestore:", e);
                    }
                }

                if (!finalName && user.displayName) {
                    finalName = user.displayName;
                }

                if (finalName) {
                    localStorage.setItem('chat_display_name', finalName);
                    localStorage.removeItem('pending_display_name');
                    
                    try {
                        await setDoc(doc(db, 'users', user.uid), {
                            displayName: finalName,
                            email: user.email || '',
                            photoURL: user.photoURL || ''
                        }, { merge: true });
                    } catch (e) {
                        console.error("Erro ao atualizar base de usuários:", e);
                    }
                    
                    currentUser.customName = finalName;
                    
                    const savedRoomInput = localStorage.getItem('pending_room_name') || localStorage.getItem('chat_room_id');
                    const savedRoomPass = localStorage.getItem('pending_room_pass');

                    if (savedRoomInput) {
                        const roomIdClean = savedRoomInput.toLowerCase().replace(/[^a-z0-9_-]/g, "");
                        if (savedRoomPass) {
                            await handleRoomAccess(roomIdClean, savedRoomInput, savedRoomPass);
                        } else {
                            try {
                                const roomDoc = await getDoc(doc(db, 'rooms', roomIdClean));
                                if (roomDoc.exists()) {
                                    enterChatRoom(roomIdClean, roomDoc.data().admin);
                                } else {
                                    console.warn("Sala persistida localmente não existe no banco.");
                                    showScreen('login');
                                }
                            } catch (e) {
                                console.error(e);
                                showScreen('login');
                            }
                        }
                    } else {
                        showScreen('login');
                    }
                } else {
                    console.warn("Nenhum nome/apelido encontrado para o usuário.");
                    showScreen('login');
                }
            }

            async function handleRoomAccess(roomId, roomOriginalName, rPass) {
                console.log(`Tentando acesso estruturado à sala ID: ${roomId} (Nome: ${roomOriginalName})`);
                const roomRef = doc(db, 'rooms', roomId);
                
                try {
                    const roomDoc = await getDoc(roomRef);

                    if (!roomDoc.exists()) {
                        console.log("Sala não encontrada. Criando nova instância de sala...");
                        await setDoc(roomRef, {
                            id: roomId,
                            displayName: roomOriginalName,
                            password: rPass,
                            admin: currentUser.uid,
                            participants: { [currentUser.uid]: currentUser.customName }
                        });
                        localStorage.setItem('chat_room_id', roomId);
                        localStorage.removeItem('pending_room_name');
                        localStorage.removeItem('pending_room_pass');
                        enterChatRoom(roomId, currentUser.uid);
                    } else {
                        const roomData = roomDoc.data();
                        if (roomData.password === rPass) {
                            console.log("Senha correta. Ingressando...");
                            let updateData = {};
                            updateData[`participants.${currentUser.uid}`] = currentUser.customName;
                            await updateDoc(roomRef, updateData);
                            
                            localStorage.setItem('chat_room_id', roomId);
                            localStorage.removeItem('pending_room_name');
                            localStorage.removeItem('pending_room_pass');
                            enterChatRoom(roomId, roomData.admin);
                        } else {
                            alert('Senha incorreta para esta sala!');
                            localStorage.removeItem('pending_room_name');
                            localStorage.removeItem('pending_room_pass');
                            await signOut(auth);
                            authProcessed = false;
                            showScreen('login');
                        }
                    }
                } catch (error) {
                    console.error("Erro crítico no fluxo de salas:", error);
                    alert("Erro ao acessar sala. Verifique suas permissões no banco.");
                    showScreen('login');
                }
            }

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    await processUserLogin(user);
                } else {
                    currentUser = null;
                    authProcessed = false;
                    showScreen('login');
                }
            });

            googleLoginBtn.addEventListener('click', async () => {
                const name = loginNameInput.value.trim();
                const roomInput = roomNameInput.value.trim();
                const pass = roomPassInput.value.trim();

                if (!name || !roomInput || !pass) return;

                localStorage.setItem('pending_display_name', name);
                localStorage.setItem('pending_room_name', roomInput);
                localStorage.setItem('pending_room_pass', pass);

                try {
                    const provider = new GoogleAuthProvider();
                    await signInWithRedirect(auth, provider);
                } catch (e) {
                    console.error("Falha ao invocar redirecionamento:", e);
                    alert("Não foi possível iniciar o login com o Google.");
                }
            });

            function enterChatRoom(roomId, adminUid) {
                currentRoomId = roomId;
                currentRoomAdmin = adminUid;
                document.getElementById('user-avatar-chat').src = currentUser.photoURL || 'https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_64dp.png';
                showScreen('chat');

                unsubscribeRoom = onSnapshot(doc(db, 'rooms', roomId), (snapshot) => {
                    if (!snapshot.exists()) {
                        alert('Esta sala foi removida.');
                        return leaveRoom();
                    }
                    const data = snapshot.data();
                    currentRoomAdmin = data.admin;
                    document.getElementById('chat-room-title').innerText = (data.displayName || data.name || roomId).toUpperCase();
                    
                    if (!data.participants || !data.participants[currentUser.uid]) {
                        alert('Você foi removido da sala.');
                        leaveRoom();
                    }
                }, (err) => {
                    console.error("Erro no listener da sala:", err);
                });

                const messagesQuery = query(collection(db, 'rooms', roomId, 'messages'), orderBy('timestamp', 'asc'));
                unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
                    const container = document.getElementById('chat-messages');
                    container.innerHTML = '';
                    
                    snapshot.forEach(docSnap => {
                        const msg = docSnap.data();
                        const isMe = msg.senderId === currentUser.uid;
                        
                        const block = document.createElement('div');
                        block.className = `msg-block ${isMe ? 'me' : 'other'}`;
                        block.dataset.id = docSnap.id;
                        block.dataset.sender = msg.senderId;
                        block.dataset.text = msg.text;
                        block.dataset.author = msg.senderName;

                        let replyHTML = '';
                        if (msg.replyTo) {
                            replyHTML = `<div class="msg-quoted"><strong>${msg.replyTo.author}:</strong> ${msg.replyTo.text}</div>`;
                        }

                        block.innerHTML = `
                            ${replyHTML}
                            <span class="msg-author">${msg.senderName}</span>
                            <span class="msg-text">${msg.text}</span>
                            <span class="msg-time">${msg.timestamp ? new Date(msg.timestamp.toMillis()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                        `;

                        block.addEventListener('click', (e) => openMessageMenu(e, block));
                        container.appendChild(block);
                    });
                    container.scrollTop = container.scrollHeight;
                }, (err) => {
                    console.error("Erro no listener de mensagens:", err);
                });
            }

            async function leaveRoom() {
                if (unsubscribeMessages) unsubscribeMessages();
                if (unsubscribeRoom) unsubscribeRoom();

                if (currentRoomId && currentUser) {
                    try {
                        const roomRef = doc(db, 'rooms', currentRoomId);
                        let updateData = {};
                        updateData[`participants.${currentUser.uid}`] = deleteField();
                        await updateDoc(roomRef, updateData);
                    } catch (e) {
                        console.warn("Erro ao retirar membro do objeto da sala:", e);
                    }
                }

                currentRoomId = null;
                localStorage.removeItem('chat_room_id');
                authProcessed = false;
                showScreen('login');
            }
            document.getElementById('btn-leave-room').addEventListener('click', leaveRoom);

            document.getElementById('btn-send').addEventListener('click', sendTextMessage);
            document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendTextMessage(); });

            async function sendTextMessage() {
                const input = document.getElementById('chat-input');
                const text = input.value.trim();
                if (!text || !currentRoomId) return;

                try {
                    const msgPayload = {
                        senderId: currentUser.uid,
                        senderName: currentUser.customName,
                        text: text,
                        timestamp: serverTimestamp()
                    };

                    if (replyMessageData) {
                        msgPayload.replyTo = replyMessageData;
                        cancelReply();
                    }

                    await addDoc(collection(db, 'rooms', currentRoomId, 'messages'), msgPayload);
                    input.value = '';
                } catch (e) {
                    console.error("Erro ao enviar mensagem:", e);
                }
            }

            function openMessageMenu(e, block) {
                selectedMessageId = block.dataset.id;
                const senderId = block.dataset.sender;
                const text = block.dataset.text;
                const author = block.dataset.author;

                const isMe = senderId === currentUser.uid;
                const isAmIAdmin = currentUser.uid === currentRoomAdmin;

                const menu = document.getElementById('message-menu');
                
                document.getElementById('menu-edit').style.display = isMe ? 'block' : 'none';
                document.getElementById('menu-delete').style.display = (isMe || isAmIAdmin) ? 'block' : 'none';

                menu.style.display = 'flex';

                document.getElementById('menu-reply').onclick = () => {
                    replyMessageData = { id: selectedMessageId, text: text, author: author };
                    document.getElementById('reply-user').innerText = author;
                    document.getElementById('reply-text').innerText = text;
                    document.getElementById('reply-preview').style.display = 'flex';
                    menu.style.display = 'none';
                };

                document.getElementById('menu-edit').onclick = async () => {
                    const newText = prompt("Edite sua mensagem:", text);
                    if (newText && newText.trim() !== "") {
                        await updateDoc(doc(db, 'rooms', currentRoomId, 'messages', selectedMessageId), {
                            text: newText.trim() + " (editada)"
                        });
                    }
                    menu.style.display = 'none';
                };

                document.getElementById('menu-delete').onclick = async () => {
                    if (confirm("Deseja apagar essa mensagem para todos?")) {
                        await deleteDoc(doc(db, 'rooms', currentRoomId, 'messages', selectedMessageId));
                    }
                    menu.style.display = 'none';
                };
            }

            function cancelReply() {
                replyMessageData = null;
                document.getElementById('reply-preview').style.display = 'none';
            }
            document.getElementById('btn-cancel-reply').addEventListener('click', cancelReply);
            document.getElementById('menu-cancel').addEventListener('click', () => { document.getElementById('message-menu').style.display = 'none'; });

            const profileModal = document.getElementById('modal-profile');
            document.getElementById('user-avatar-chat').addEventListener('click', () => {
                document.getElementById('modal-user-img').src = currentUser.photoURL || 'https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_64dp.png';
                document.getElementById('modal-user-name').innerText = currentUser.customName;
                document.getElementById('modal-user-email').innerText = currentUser.email || 'Sem e-mail';
                profileModal.style.display = 'flex';
            });

            document.getElementById('close-profile').addEventListener('click', () => profileModal.style.display = 'none');
            document.getElementById('btn-logout').addEventListener('click', async () => { 
                localStorage.clear();
                await signOut(auth); 
                profileModal.style.display = 'none'; 
            });

            document.getElementById('btn-toggle-theme').addEventListener('click', () => {
                if (document.body.classList.contains('theme-dark')) {
                    document.body.classList.replace('theme-dark', 'theme-light');
                } else {
                    document.body.classList.replace('theme-light', 'theme-dark');
                }
            });

            const roomModal = document.getElementById('modal-room');
            document.getElementById('btn-room-details').addEventListener('click', async () => {
                const roomDoc = await getDoc(doc(db, 'rooms', currentRoomId));
                if (!roomDoc.exists()) return;
                const roomData = roomDoc.data();

                document.getElementById('info-room-name').innerText = `Sala: ${(roomData.displayName || roomData.name || currentRoomId).toUpperCase()}`;
                
                const isAmIAdmin = currentUser.uid === currentRoomAdmin;
                document.getElementById('adm-controls').style.display = isAmIAdmin ? 'block' : 'none';

                const pList = document.getElementById('participants-list');
                pList.innerHTML = '';
                
                if (roomData.participants) {
                    Object.keys(roomData.participants).forEach(uid => {
                        const name = roomData.participants[uid];
                        const row = document.createElement('div');
                        row.className = 'participant-row';
                        row.innerHTML = `
                            <span>${name} ${uid === roomData.admin ? '<strong>(ADM)</strong>' : ''}</span>
                            ${(isAmIAdmin && uid !== currentUser.uid) ? `<button class="btn-danger" style="width:auto; padding:4px 8px; margin:0;" onclick="kickUser('${uid}')">Remover</button>` : ''}
                        `;
                        pList.appendChild(row);
                    });
                }

                roomModal.style.display = 'flex';
            });

            document.getElementById('close-room').addEventListener('click', () => roomModal.style.display = 'none');

            window.kickUser = async function(uidTarget) {
                if (confirm("Tem certeza que deseja remover este participante?")) {
                    let updateData = {};
                    updateData[`participants.${uidTarget}`] = deleteField();
                    await updateDoc(doc(db, 'rooms', currentRoomId), updateData);
                    alert('Participante removido!');
                    roomModal.style.display = 'none';
                }
            };

            document.getElementById('btn-rename-room').addEventListener('click', async () => {
                const newName = document.getElementById('new-room-name').value.trim();
                if (!newName) return alert('Insira um nome válido!');
                try {
                    await updateDoc(doc(db, 'rooms', currentRoomId), { displayName: newName });
                    alert('Nome alterado com sucesso!');
                    document.getElementById('new-room-name').value = '';
                    roomModal.style.display = 'none';
                } catch (e) {
                    console.error(e);
                    alert("Não foi possível renomear a sala.");
                }
            });

            document.getElementById('btn-clear-chat').addEventListener('click', async () => {
                if (confirm("ATENÇÃO: Deseja apagar permanentemente todas as mensagens desta sala?")) {
                    try {
                        const messagesSnapshot = await getDocs(collection(db, 'rooms', currentRoomId, 'messages'));
                        const batch = writeBatch(db);
                        messagesSnapshot.forEach(docSnap => batch.delete(docSnap.ref));
                        await batch.commit();
                        alert('Histórico de conversas limpo!');
                        roomModal.style.display = 'none';
                    } catch (e) {
                        console.error(e);
                        alert("Erro ao limpar histórico.");
                    }
                }
            });
        }
    </script>
</body>
</html>
