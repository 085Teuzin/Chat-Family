<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Família Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dark {
            --bg-main: #111827;
            --bg-card: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border: #374151;
            --chat-bg: #111827;
            --msg-in: #374151;
            --msg-out: #047857;
        }
        .light {
            --bg-main: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --chat-bg: #efeae2;
            --msg-in: #ffffff;
            --msg-out: #d9fdd3;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .app-card { background-color: var(--bg-card); border-color: var(--border); }
        .text-muted { color: var(--text-muted); }
        .border-custom { border-color: var(--border); }
        .chat-area { background-color: var(--chat-bg); }
        .msg-in { background-color: var(--msg-in); color: var(--text-main); }
        .msg-out { background-color: var(--msg-out); color: #111827; }
        .hide { display: none !important; }
    </style>
</head>
<body class="light h-screen w-screen overflow-hidden flex flex-col justify-between">

    <div id="screen-login" class="flex-1 flex flex-col items-center justify-center p-6">
        <div class="app-card w-full max-w-sm p-6 rounded-2xl shadow-xl border flex flex-col items-center text-center">
            <div class="w-20 h-20 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-4xl shadow-lg mb-4">
                <i class="fas fa-users-rectangle"></i>
            </div>
            <h1 class="text-2xl font-black mb-2">Família Chat</h1>
            <p class="text-muted text-sm mb-6">Seu espaço seguro, privado e exclusivo para conversar com quem importa.</p>
            
            <div class="w-full text-left mb-4">
                <label class="block text-xs font-bold uppercase tracking-wider mb-2 text-muted">Como a família te chama?</label>
                <input type="text" id="login-nickname" placeholder="Ex: Tio João, Aninha..." class="w-full p-3 rounded-xl border border-custom bg-transparent outline-none focus:border-emerald-500 transition">
            </div>

            <button id="btn-login" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-3 rounded-xl flex items-center justify-center gap-3 shadow-md transition">
                <i class="fab fa-google text-lg"></i> Entrar com o Google
            </button>
        </div>
    </div>

    <div id="screen-lobby" class="hide flex-1 flex flex-col p-4 max-w-md mx-auto w-full justify-center">
        <div class="app-card rounded-2xl p-6 border shadow-xl w-full">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <img id="lobby-avatar" src="" class="w-10 h-10 rounded-full border border-custom object-cover">
                    <div>
                        <h2 class="font-bold text-sm leading-tight" id="lobby-welcome">Olá</h2>
                        <span class="text-xs text-muted">Acessar uma sala</span>
                    </div>
                </div>
                <button id="btn-toggle-theme-lobby" class="w-9 h-9 rounded-xl border border-custom flex items-center justify-center text-muted">
                    <i class="fas fa-moon"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider mb-1 text-muted">Nome da Sala</label>
                    <input type="text" id="room-name" placeholder="Ex: almoco-domingo" class="w-full p-3 rounded-xl border border-custom bg-transparent outline-none focus:border-emerald-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider mb-1 text-muted">Senha de Acesso</label>
                    <input type="password" id="room-pass" placeholder="••••••••" class="w-full p-3 rounded-xl border border-custom bg-transparent outline-none focus:border-emerald-500 transition">
                </div>
                <button id="btn-join-room" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-3 rounded-xl shadow-md transition">
                    Entrar ou Criar Sala
                </button>
                <button id="btn-logout" class="w-full bg-transparent border border-red-500/30 text-red-500 font-medium p-2 rounded-xl text-sm transition mt-2">
                    Sair da Conta
                </button>
            </div>
        </div>
    </div>

    <div id="screen-chat" class="hide flex-1 flex flex-col h-full w-full max-w-md mx-auto relative app-card border-x">
        <header class="h-16 px-4 border-b border-custom flex items-center justify-between z-10">
            <div class="flex items-center gap-3 overflow-hidden">
                <button id="btn-back-lobby" class="text-muted text-lg pr-1">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="overflow-hidden">
                    <h3 id="chat-room-title" class="font-bold text-base truncate">Nome da Sala</h3>
                    <span id="chat-user-role" class="text-[10px] uppercase font-black px-1.5 py-0.5 rounded bg-emerald-500/20 text-emerald-500 tracking-wider">Membro</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="btn-toggle-theme-chat" class="w-9 h-9 rounded-xl flex items-center justify-center text-muted">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="btn-open-panel" class="w-9 h-9 rounded-xl flex items-center justify-center text-muted">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
            </div>
        </header>

        <div id="chat-messages" class="flex-1 chat-area p-4 overflow-y-auto space-y-3 flex flex-col"></div>

        <div id="reply-preview" class="hide px-4 py-2 bg-emerald-500/10 border-t border-custom flex items-center justify-between text-xs">
            <div class="border-l-4 border-emerald-500 pl-2 overflow-hidden">
                <span class="font-bold block text-emerald-600" id="reply-user">Respondendo a</span>
                <p class="text-muted truncate" id="reply-text">Conteúdo</p>
            </div>
            <button id="btn-cancel-reply" class="text-muted text-sm px-1">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="p-3 border-t border-custom flex items-end gap-2 z-10">
            <div class="flex-1 bg-transparent app-card border border-custom rounded-2xl p-2 min-h-[44px] flex flex-col justify-end">
                <div id="edit-indicator" class="hide text-[10px] font-bold text-amber-500 px-2 pb-1 flex justify-between items-center">
                    <span>EDITANDO MENSAGEM</span>
                    <button id="btn-cancel-edit" class="text-muted font-normal text-xs"><i class="fas fa-times"></i></button>
                </div>
                <textarea id="msg-input" rows="1" placeholder="Mensagem" class="w-full bg-transparent outline-none resize-none px-2 max-h-24 overflow-y-auto text-sm" style="line-height: 20px;"></textarea>
            </div>
            <button id="btn-send" class="w-11 h-11 bg-emerald-600 rounded-full flex items-center justify-center text-white shadow-md flex-shrink-0">
                <i class="fas fa-paper-plane text-sm ml-0.5"></i>
            </button>
        </div>

        <div id="modal-panel" class="hide absolute inset-0 bg-black/60 z-20 flex items-end">
            <div class="w-full app-card rounded-t-3xl border-t p-6 space-y-6 transform translate-y-0 transition-transform">
                <div class="flex justify-between items-center">
                    <h4 class="font-black text-lg">Detalhes da Sala</h4>
                    <button id="btn-close-panel" class="w-8 h-8 rounded-full border border-custom flex items-center justify-center text-muted">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="space-y-4">
                    <div class="flex items-center gap-4 border-b border-custom pb-4">
                        <div class="relative group">
                            <img id="panel-user-avatar" src="" class="w-14 h-14 rounded-full object-cover border border-custom">
                            <label for="upload-avatar" class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center text-white opacity-0 group-hover:opacity-100 cursor-pointer text-xs transition">
                                <i class="fas fa-camera"></i>
                            </label>
                            <input type="file" id="upload-avatar" accept="image/*" class="hidden">
                        </div>
                        <div>
                            <span class="text-xs text-muted block font-bold uppercase tracking-wider">Seu Perfil Local</span>
                            <div class="flex items-center gap-2">
                                <span id="panel-user-name" class="font-bold text-base">Nome</span>
                            </div>
                        </div>
                    </div>

                    <div id="adm-controls" class="hide space-y-4">
                        <div class="bg-amber-500/10 border border-amber-500/20 p-3 rounded-xl text-xs text-amber-500 font-bold flex items-center gap-2">
                            <i class="fas fa-shield-alt"></i> Você é o Administrador desta sala.
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider mb-1 text-muted">Gerenciar Nome da Sala</label>
                            <div class="flex gap-2">
                                <input type="text" id="panel-room-rename" class="flex-1 p-2.5 text-sm rounded-xl border border-custom bg-transparent outline-none focus:border-emerald-500">
                                <button id="btn-room-rename" class="bg-emerald-600 text-white font-bold px-4 text-sm rounded-xl">Salvar</button>
                            </div>
                        </div>
                        <div class="pt-2">
                            <button id="btn-room-clear" class="w-full bg-red-600/10 border border-red-600/20 text-red-500 font-bold p-3 rounded-xl text-sm flex items-center justify-center gap-2">
                                <i class="fas fa-trash-alt"></i> Limpar Todo o Histórico
                            </button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-bold uppercase tracking-wider mb-1 text-muted">Membros Conectados</label>
                        <div id="panel-members-list" class="max-h-40 overflow-y-auto space-y-2 pr-1"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, get, child, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb",
            measurementId: "G-TLJ87EYNFP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let currentRoom = null;
        let userRole = "Membro";
        let activeReplyId = null;
        let activeEditId = null;
        let unsubRoomMessages = null;
        let unsubRoomMeta = null;
        let unsubRoomUsers = null;

        const scrLogin = document.getElementById("screen-login");
        const scrLobby = document.getElementById("screen-lobby");
        const scrChat = document.getElementById("screen-chat");

        const inputLoginNick = document.getElementById("login-nickname");
        const btnLogin = document.getElementById("btn-login");
        
        const lobbyAvatar = document.getElementById("lobby-avatar");
        const lobbyWelcome = document.getElementById("lobby-welcome");
        const inputRoomName = document.getElementById("room-name");
        const inputRoomPass = document.getElementById("room-pass");
        const btnJoinRoom = document.getElementById("btn-join-room");
        const btnLogout = document.getElementById("btn-logout");

        const chatRoomTitle = document.getElementById("chat-room-title");
        const chatUserRole = document.getElementById("chat-user-role");
        const chatMessages = document.getElementById("chat-messages");
        const msgInput = document.getElementById("msg-input");
        const btnSend = document.getElementById("btn-send");
        const btnBackLobby = document.getElementById("btn-back-lobby");
        
        const replyPreview = document.getElementById("reply-preview");
        const replyUser = document.getElementById("reply-user");
        const replyText = document.getElementById("reply-text");
        const btnCancelReply = document.getElementById("btn-cancel-reply");

        const editIndicator = document.getElementById("edit-indicator");
        const btnCancelEdit = document.getElementById("btn-cancel-edit");

        const modalPanel = document.getElementById("modal-panel");
        const btnOpenPanel = document.getElementById("btn-open-panel");
        const btnClosePanel = document.getElementById("btn-close-panel");
        const panelUserAvatar = document.getElementById("panel-user-avatar");
        const panelUserName = document.getElementById("panel-user-name");
        const uploadAvatar = document.getElementById("upload-avatar");
        const admControls = document.getElementById("adm-controls");
        const panelRoomRename = document.getElementById("panel-room-rename");
        const btnRoomRename = document.getElementById("btn-room-rename");
        const btnRoomClear = document.getElementById("btn-room-clear");
        const panelMembersList = document.getElementById("panel-members-list");

        const btnThemeLobby = document.getElementById("btn-toggle-theme-lobby");
        const btnThemeChat = document.getElementById("btn-toggle-theme-chat");

        function setupTheme() {
            const saved = localStorage.getItem("theme") || "light";
            document.body.className = `${saved} h-screen w-screen overflow-hidden flex flex-col justify-between`;
            const updateIcons = () => {
                const icon = saved === "dark" ? "<i class='fas fa-sun'></i>" : "<i class='fas fa-moon'></i>";
                btnThemeLobby.innerHTML = icon;
                btnThemeChat.innerHTML = icon;
            };
            updateIcons();
        }

        function toggleTheme() {
            const isDark = document.body.classList.contains("dark");
            const next = isDark ? "light" : "dark";
            localStorage.setItem("theme", next);
            document.body.className = `${next} h-screen w-screen overflow-hidden flex flex-col justify-between`;
            const icon = next === "dark" ? "<i class='fas fa-sun'></i>" : "<i class='fas fa-moon'></i>";
            btnThemeLobby.innerHTML = icon;
            btnThemeChat.innerHTML = icon;
        }

        btnThemeLobby.addEventListener("click", toggleTheme);
        btnThemeChat.addEventListener("click", toggleTheme);
        setupTheme();

        msgInput.addEventListener("input", () => {
            msgInput.style.height = "auto";
            msgInput.style.height = msgInput.scrollHeight + "px";
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snapshot = await get(ref(db, `users/${user.uid}`));
                if (snapshot.exists()) {
                    currentUser = snapshot.val();
                    showScreen("lobby");
                } else {
                    await signOut(auth);
                    showScreen("login");
                }
            } else {
                showScreen("login");
            }
        });

        btnLogin.addEventListener("click", async () => {
            const nickname = inputLoginNick.value.trim();
            if (!nickname) return alert("Por favor, digite seu apelido familiar primeiro!");

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                currentUser = {
                    uid: user.uid,
                    name: nickname,
                    email: user.email,
                    avatar: user.photoURL || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop"
                };

                await set(ref(db, `users/${user.uid}`), currentUser);
                showScreen("lobby");
            } catch (err) {
                alert("Erro na autenticação: " + err.message);
            }
        });

        btnLogout.addEventListener("click", () => {
            signOut(auth).then(() => {
                currentUser = null;
                showScreen("login");
            });
        });

        function showScreen(screen) {
            scrLogin.classList.add("hide");
            scrLobby.classList.add("hide");
            scrChat.classList.add("hide");

            if (screen === "login") {
                scrLogin.classList.remove("hide");
            } else if (screen === "lobby") {
                scrLobby.classList.remove("hide");
                lobbyWelcome.innerText = `Olá, ${currentUser.name}!`;
                lobbyAvatar.src = currentUser.avatar;
            } else if (screen === "chat") {
                scrChat.classList.remove("hide");
            }
        }

        btnJoinRoom.addEventListener("click", async () => {
            const rawRoom = inputRoomName.value.trim().toLowerCase();
            const pass = inputRoomPass.value.trim();

            if (!rawRoom || !pass) return alert("Preencha o nome da sala e a senha!");
            const roomName = rawRoom.replace(/[^a-z0-9_-]/g, "");

            const roomRef = ref(db, `rooms/${roomName}`);
            const snapshot = await get(roomRef);

            if (!snapshot.exists()) {
                const newRoom = {
                    meta: {
                        name: roomName,
                        password: pass,
                        createdBy: currentUser.uid
                    }
                };
                await set(roomRef, newRoom);
                enterRoom(roomName, "ADM");
            } else {
                const roomData = snapshot.val();
                if (roomData.meta.password !== pass) {
                    return alert("Senha incorreta para esta sala da família!");
                }
                const role = roomData.meta.createdBy === currentUser.uid ? "ADM" : "Membro";
                enterRoom(roomName, role);
            }
        });

        async function enterRoom(roomName, role) {
            currentRoom = roomName;
            userRole = role;
            
            chatRoomTitle.innerText = roomName;
            chatUserRole.innerText = role;
            if(role === "ADM") {
                chatUserRole.className = "text-[10px] uppercase font-black px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-500 tracking-wider";
            } else {
                chatUserRole.className = "text-[10px] uppercase font-black px-1.5 py-0.5 rounded bg-emerald-500/20 text-emerald-500 tracking-wider";
            }

            panelUserName.innerText = currentUser.name;
            panelUserAvatar.src = currentUser.avatar;
            panelRoomRename.value = roomName;

            if (role === "ADM") {
                admControls.classList.remove("hide");
            } else {
                admControls.classList.add("hide");
            }

            await set(ref(db, `rooms/${roomName}/users/${currentUser.uid}`), {
                uid: currentUser.uid,
                name: currentUser.name,
                avatar: currentUser.avatar,
                role: role
            });

            showScreen("chat");
            listenRoom(roomName);
        }

        function listenRoom(roomName) {
            if (unsubRoomMessages) unsubRoomMessages();
            if (unsubRoomMeta) unsubRoomMeta();
            if (unsubRoomUsers) unsubRoomUsers();

            unsubRoomMeta = onValue(ref(db, `rooms/${roomName}/meta`), (snapshot) => {
                if (!snapshot.exists()) {
                    exitRoomForce();
                    return;
                }
                const meta = snapshot.val();
                chatRoomTitle.innerText = meta.name;
                currentRoom = meta.name;
            });

            unsubRoomUsers = onValue(ref(db, `rooms/${roomName}/users`), (snapshot) => {
                if (!snapshot.exists()) return;
                const users = snapshot.val();
                
                if (!users[currentUser.uid]) {
                    exitRoomForce();
                    alert("Você foi removido desta sala pelo Administrador.");
                    return;
                }

                userRole = users[currentUser.uid].role;
                chatUserRole.innerText = userRole;

                panelMembersList.innerHTML = "";
                Object.values(users).forEach(u => {
                    const item = document.createElement("div");
                    item.className = "flex items-center justify-between bg-black/5 p-2 rounded-xl border border-custom text-sm";
                    
                    let kickBtn = "";
                    if (userRole === "ADM" && u.uid !== currentUser.uid) {
                        kickBtn = `<button class="text-red-500 text-xs font-bold px-2 py-1 border border-red-500/20 rounded-lg bg-red-500/5 btn-kick" data-uid="${u.uid}"><i class="fas fa-user-slash"></i> Banir</button>`;
                    }

                    item.innerHTML = `
                        <div class="flex items-center gap-2 overflow-hidden">
                            <img src="${u.avatar}" class="w-7 h-7 rounded-full object-cover">
                            <span class="font-bold truncate">${u.name} <span class="text-[9px] text-muted">(${u.role})</span></span>
                        </div>
                        ${kickBtn}
                    `;
                    panelMembersList.appendChild(item);
                });

                document.querySelectorAll(".btn-kick").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        const targetUid = e.currentTarget.getAttribute("data-uid");
                        remove(ref(db, `rooms/${currentRoom}/users/${targetUid}`));
                    });
                });
            });

            unsubRoomMessages = onValue(ref(db, `rooms/${roomName}/messages`), (snapshot) => {
                chatMessages.innerHTML = "";
                if (!snapshot.exists()) return;

                const msgs = snapshot.val();
                Object.keys(msgs).forEach(id => {
                    const m = msgs[id];
                    const isMe = m.senderId === currentUser.uid;
                    
                    const msgDiv = document.createElement("div");
                    msgDiv.className = `max-w-[85%] rounded-2xl p-3 shadow-sm relative group flex flex-col ${isMe ? "msg-out self-end rounded-tr-none" : "msg-in self-start rounded-tl-none"}`;
                    
                    let replyMarkup = "";
                    if (m.replyTo) {
                        replyMarkup = `
                            <div class="border-l-2 border-emerald-600 bg-black/5 px-2 py-1 rounded text-xs mb-1 opacity-80 pointer-events-none">
                                <span class="font-bold block text-emerald-700 text-[10px]">${m.replyTo.user}</span>
                                <p class="truncate">${m.replyTo.text}</p>
                            </div>
                        `;
                    }

                    let actionMenu = "";
                    const canEdit = isMe;
                    const canDelete = isMe || userRole === "ADM";

                    if (canEdit || canDelete || !isMe) {
                        actionMenu = `
                            <div class="absolute top-1 right-2 opacity-0 group-hover:opacity-100 flex gap-2 bg-black/40 px-2 py-1 rounded-lg text-[10px] text-white backdrop-blur-sm transition">
                                <button class="act-reply" data-id="${id}" data-user="${m.senderName}" data-text="${m.text}"><i class="fas fa-reply"></i></button>
                                ${canEdit ? `<button class="act-edit" data-id="${id}" data-text="${m.text}"><i class="fas fa-pen"></i></button>` : ""}
                                ${canDelete ? `<button class="act-del" data-id="${id}"><i class="fas fa-trash"></i></button>` : ""}
                            </div>
                        `;
                    }

                    msgDiv.innerHTML = `
                        ${replyMarkup}
                        <span class="text-[10px] font-black text-emerald-700 block mb-0.5">${m.senderName}</span>
                        <p class="text-sm whitespace-pre-wrap break-words pr-4">${m.text}</p>
                        <div class="flex items-center justify-end gap-1 mt-1 self-end text-[9px] text-muted">
                            ${m.edited ? "<span>(editada)</span>" : ""}
                            <span>${m.time}</span>
                        </div>
                        ${actionMenu}
                    `;
                    chatMessages.appendChild(msgDiv);
                });

                chatMessages.scrollTop = chatMessages.scrollHeight;

                document.querySelectorAll(".act-reply").forEach(b => b.addEventListener("click", e => {
                    activeReplyId = e.currentTarget.getAttribute("data-id");
                    replyUser.innerText = e.currentTarget.getAttribute("data-user");
                    replyText.innerText = e.currentTarget.getAttribute("data-text");
                    replyPreview.classList.remove("hide");
                }));

                document.querySelectorAll(".act-edit").forEach(b => b.addEventListener("click", e => {
                    activeEditId = e.currentTarget.getAttribute("data-id");
                    msgInput.value = e.currentTarget.getAttribute("data-text");
                    editIndicator.classList.remove("hide");
                    msgInput.focus();
                }));

                document.querySelectorAll(".act-del").forEach(b => b.addEventListener("click", e => {
                    const mid = e.currentTarget.getAttribute("data-id");
                    remove(ref(db, `rooms/${currentRoom}/messages/${mid}`));
                }));
            });
        }

        async function exitRoomForce() {
            if (unsubRoomMessages) unsubRoomMessages();
            if (unsubRoomMeta) unsubRoomMeta();
            if (unsubRoomUsers) unsubRoomUsers();
            
            modalPanel.classList.add("hide");
            showScreen("lobby");
            currentRoom = null;
        }

        btnBackLobby.addEventListener("click", async () => {
            if (currentRoom) {
                await remove(ref(db, `rooms/${currentRoom}/users/${currentUser.uid}`));
            }
            exitRoomForce();
        });

        btnCancelReply.addEventListener("click", () => {
            activeReplyId = null;
            replyPreview.classList.add("hide");
        });

        btnCancelEdit.addEventListener("click", () => {
            activeEditId = null;
            msgInput.value = "";
            editIndicator.classList.add("hide");
        });

        btnSend.addEventListener("click", async () => {
            const text = msgInput.value.trim();
            if (!text) return;

            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (activeEditId) {
                await update(ref(db, `rooms/${currentRoom}/messages/${activeEditId}`), {
                    text: text,
                    edited: true
                });
                activeEditId = null;
                editIndicator.classList.add("hide");
            } else {
                let replyPayload = null;
                if (activeReplyId) {
                    replyPayload = {
                        user: replyUser.innerText,
                        text: replyText.innerText
                    };
                }

                const msgRef = push(ref(db, `rooms/${currentRoom}/messages`));
                await set(msgRef, {
                    senderId: currentUser.uid,
                    senderName: currentUser.name,
                    text: text,
                    time: timeStr,
                    replyTo: replyPayload
                });

                activeReplyId = null;
                replyPreview.classList.add("hide");
            }

            msgInput.value = "";
            msgInput.style.height = "auto";
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        btnOpenPanel.addEventListener("click", () => modalPanel.classList.remove("hide"));
        btnClosePanel.addEventListener("click", () => modalPanel.classList.add("hide"));

        uploadAvatar.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64 = reader.result;
                currentUser.avatar = base64;
                
                await update(ref(db, `users/${currentUser.uid}`), { avatar: base64 });
                await update(ref(db, `rooms/${currentRoom}/users/${currentUser.uid}`), { avatar: base64 });
                
                panelUserAvatar.src = base64;
                lobbyAvatar.src = base64;
            };
            reader.readAsDataURL(file);
        });

        btnRoomRename.addEventListener("click", async () => {
            if (userRole !== "ADM") return;
            const newNameRaw = panelRoomRename.value.trim().toLowerCase();
            const newName = newNameRaw.replace(/[^a-z0-9_-]/g, "");
            if (!newName || newName === currentRoom) return;

            const oldRoom = currentRoom;
            const oldSnapshot = await get(ref(db, `rooms/${oldRoom}`));
            
            if (oldSnapshot.exists()) {
                const roomData = oldSnapshot.val();
                roomData.meta.name = newName;
                
                await set(ref(db, `rooms/${newName}`), roomData);
                await remove(ref(db, `rooms/${oldRoom}`));
                
                currentRoom = newName;
                chatRoomTitle.innerText = newName;
                listenRoom(newName);
                alert("Sala renomeada com sucesso para toda a família!");
            }
        });

        btnRoomClear.addEventListener("click", async () => {
            if (userRole !== "ADM") return;
            if (confirm("Tem certeza que deseja apagar permanentemente todas as mensagens desta sala?")) {
                await remove(ref(db, `rooms/${currentRoom}/messages`));
                alert("Histórico limpo!");
            }
        });
    </script>
</body>
</html>
