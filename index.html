<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Família Web App</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .theme-dark {
            --bg-main: #000000;
            --bg-surface: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            --msg-me: #056162;
            --msg-other: #262626;
            --primary: #4caf50;
            --danger: #d32f2f;
        }

        .theme-light {
            --bg-main: #f0f2f5;
            --bg-surface: #ffffff;
            --bg-card: #f8f9fa;
            --text-main: #000000;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --msg-me: #d9fdd3;
            --msg-other: #ffffff;
            --primary: #25d366;
            --danger: #e53935;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
            background-color: var(--bg-main);
        }

        .screen.active {
            display: flex;
        }

        .auth-container, .rooms-container {
            margin: auto;
            width: 85%;
            max-width: 340px;
            padding: 25px;
            background-color: var(--bg-surface);
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .auth-container h1 { 
            font-size: 24px; 
            font-weight: 600; 
            margin-bottom: 20px; 
            letter-spacing: -0.5px;
        }

        .credits {
            position: absolute;
            bottom: -40px;
            left: 0;
            width: 100%;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            opacity: 0.6;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        .btn-primary { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-primary:disabled { background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed; opacity: 0.5; }
        .btn-secondary { width: 100%; padding: 10px; background-color: var(--border-color); color: var(--text-main); border: none; border-radius: 6px; margin-top: 10px; cursor: pointer;}
        .btn-danger { width: 100%; padding: 10px; background-color: var(--danger); color: white; border: none; border-radius: 6px; margin-top: 10px; font-weight: bold; cursor: pointer;}
        .btn-icon { background: none; border: none; color: var(--text-main); font-size: 24px; cursor: pointer; padding: 0 10px; }

        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
        }

        .room-info-header { flex: 1; margin-left: 15px; cursor: pointer; }
        .room-info-header span { display: block; }
        #chat-room-status { font-size: 12px; color: var(--text-muted); }

        .avatar { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; object-fit: cover; }
        .large-avatar { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-block {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 12px;
            position: relative;
            word-wrap: break-word;
            font-size: 15px;
            cursor: pointer;
        }

        .msg-block.me { background-color: var(--msg-me); align-self: flex-end; border-top-right-radius: 2px; }
        .msg-block.other { background-color: var(--msg-other); align-self: flex-start; border-top-left-radius: 2px; border: 1px solid var(--border-color); }

        .msg-author { font-size: 11px; font-weight: bold; color: var(--primary); display: block; margin-bottom: 3px; }
        .msg-text { display: block; }
        .msg-time { font-size: 10px; color: var(--text-muted); text-align: right; display: block; margin-top: 4px; }

        .msg-quoted {
            background: rgba(0,0,0,0.15);
            border-left: 3px solid var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            background-color: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            gap: 10px;
        }

        .chat-input-area input { flex: 1; margin-bottom: 0; }
        .btn-send { background-color: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .reply-zone {
            background-color: var(--bg-surface);
            padding: 8px 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
        }
        .reply-content { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        #btn-cancel-reply { background: none; border: none; color: var(--text-main); font-size: 16px; cursor: pointer; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background-color: var(--bg-surface);
            padding: 25px;
            border-radius: 12px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .close-modal { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 18px; }
        .list-container { max-height: 200px; overflow-y: auto; margin-top: 15px; text-align: left; }
        .participant-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-color); }

        .context-menu {
            display: none;
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background-color: var(--bg-surface);
            border-top-left-radius: 16px; border-top-right-radius: 16px;
            padding: 15px; box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
            z-index: 200;
            gap: 10px; flex-direction: column;
        }

        .context-menu button {
            width: 100%; padding: 14px; background-color: var(--bg-card); color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 8px; font-size: 16px; cursor: pointer;
        }
        .context-menu #menu-delete { color: var(--danger); }
    </style>
</head>
<body class="theme-dark">

    <div id="screen-login" class="screen active">
        <div class="auth-container">
            <h1>Família Chat</h1>
            <input type="text" id="input-login-name" placeholder="Como quer ser chamado?">
            <button id="btn-google-login" class="btn-primary" disabled>Entrar com o Google</button>
            <div class="credits">Made By: @085_Teuzinnn</div>
        </div>
    </div>

    <div id="screen-rooms" class="screen">
        <div class="header-bar">
            <span class="app-title">Salas</span>
            <img id="user-avatar-rooms" class="avatar" alt="Perfil">
        </div>
        <div class="rooms-container">
            <h2>Entrar ou Criar Sala</h2>
            <input type="text" id="room-name" placeholder="Nome da sala...">
            <input type="password" id="room-pass" placeholder="Senha da sala...">
            <button id="btn-enter-room" class="btn-primary">Acessar Sala</button>
        </div>
    </div>

    <div id="screen-chat" class="screen">
        <div class="header-bar">
            <button id="btn-leave-room" class="btn-icon">←</button>
            <div class="room-info-header" id="btn-room-details">
                <span id="chat-room-title">Nome da Sala</span>
                <span id="chat-room-status">Clique para detalhes</span>
            </div>
            <img id="user-avatar-chat" class="avatar" alt="Perfil">
        </div>

        <div id="chat-messages" class="messages-container"></div>

        <div id="message-menu" class="context-menu">
            <button id="menu-reply">Responder</button>
            <button id="menu-edit">Editar</button>
            <button id="menu-delete">Apagar para todos</button>
            <button id="menu-cancel">Cancelar</button>
        </div>

        <div id="reply-preview" class="reply-zone" style="display: none;">
            <div class="reply-content">
                <small>Respondendo a <span id="reply-user"></span></small>
                <p id="reply-text"></p>
            </div>
            <button id="btn-cancel-reply">✕</button>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Digite sua mensagem...">
            <button id="btn-send" class="btn-send">Enviar</button>
        </div>
    </div>

    <div id="modal-profile" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-profile">✕</span>
            <img id="modal-user-img" class="large-avatar" alt="Foto">
            <h3 id="modal-user-name">Nome do Usuário</h3>
            <p id="modal-user-email">email@gmail.com</p>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid var(--border-color);">
            <button id="btn-toggle-theme" class="btn-secondary">Alternar Tema (Claro/Escuro)</button>
            <button id="btn-logout" class="btn-danger">Sair da Conta</button>
        </div>
    </div>

    <div id="modal-room" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-room">✕</span>
            <h3 id="info-room-name">Sala</h3>
            
            <div id="adm-controls" style="display: none; margin-top: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
                <h4 style="margin-bottom: 10px;">Painel do Administrador</h4>
                <input type="text" id="new-room-name" placeholder="Mudar nome da sala">
                <button id="btn-rename-room" class="btn-secondary">Salvar Novo Nome</button>
                <button id="btn-clear-chat" class="btn-danger">Limpar Toda a Conversa</button>
            </div>

            <h4 style="margin-top: 15px;">Participantes na Sala</h4>
            <div id="participants-list" class="list-container"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb",
            measurementId: "G-TLJ87EYNFP"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentRoomId = null;
        let currentRoomAdmin = null;
        let selectedMessageId = null; 
        let replyMessageData = null; 
        let unsubscribeMessages = null;
        let unsubscribeRoom = null;

        const screens = {
            login: document.getElementById('screen-login'),
            rooms: document.getElementById('screen-rooms'),
            chat: document.getElementById('screen-chat')
        };

        const loginNameInput = document.getElementById('input-login-name');
        const googleLoginBtn = document.getElementById('btn-google-login');

        loginNameInput.addEventListener('input', () => {
            googleLoginBtn.disabled = loginNameInput.value.trim() === '';
        });

        function showScreen(screenKey) {
            Object.keys(screens).forEach(key => {
                screens[key].classList.toggle('active', key === screenKey);
            });
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const savedName = localStorage.getItem('chat_display_name') || loginNameInput.value.trim();
                
                if (savedName) {
                    localStorage.setItem('chat_display_name', savedName);
                    await db.collection('users').doc(user.uid).set({
                        displayName: savedName,
                        email: user.email,
                        photoURL: user.photoURL
                    }, { merge: true });
                    currentUser.customName = savedName;
                    loadRoomsScreen();
                } else {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists && userDoc.data().displayName) {
                        currentUser.customName = userDoc.data().displayName;
                        localStorage.setItem('chat_display_name', currentUser.customName);
                        loadRoomsScreen();
                    } else {
                        auth.signOut();
                        localStorage.removeItem('chat_display_name');
                        showScreen('login');
                    }
                }
            } else {
                currentUser = null;
                showScreen('login');
            }
        });

        googleLoginBtn.addEventListener('click', () => {
            const name = loginNameInput.value.trim();
            if (!name) return;
            localStorage.setItem('chat_display_name', name);
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        });

        auth.getRedirectResult().catch((error) => {
            console.error("Erro no login: ", error);
            alert("Erro ao fazer login. Tente novamente.");
        });

        function loadRoomsScreen() {
            document.getElementById('user-avatar-rooms').src = currentUser.photoURL || '';
            showScreen('rooms');
        }

        document.getElementById('btn-enter-room').addEventListener('click', async () => {
            const rName = document.getElementById('room-name').value.trim().toLowerCase();
            const rPass = document.getElementById('room-pass').value.trim();

            if (!rName || !rPass) return alert('Preencha os dados da sala!');

            const roomRef = db.collection('rooms').doc(rName);
            const roomDoc = await roomRef.get();

            if (!roomDoc.exists) {
                await roomRef.set({
                    name: rName,
                    password: rPass,
                    admin: currentUser.uid,
                    participants: { [currentUser.uid]: currentUser.customName }
                });
                enterChatRoom(rName, currentUser.uid);
            } else {
                const roomData = roomDoc.data();
                if (roomData.password === rPass) {
                    let updateData = {};
                    updateData[`participants.${currentUser.uid}`] = currentUser.customName;
                    await roomRef.update(updateData);
                    enterChatRoom(rName, roomData.admin);
                } else {
                    alert('Senha incorreta para esta sala!');
                }
            }
        });

        function enterChatRoom(roomId, adminUid) {
            currentRoomId = roomId;
            currentRoomAdmin = adminUid;
            document.getElementById('user-avatar-chat').src = currentUser.photoURL || '';
            showScreen('chat');

            unsubscribeRoom = db.collection('rooms').doc(roomId).onSnapshot(doc => {
                if (!doc.exists) return leaveRoom();
                const data = doc.data();
                currentRoomAdmin = data.admin;
                document.getElementById('chat-room-title').innerText = data.name.toUpperCase();
                
                if (!data.participants[currentUser.uid]) {
                    alert('Você foi removido desta sala.');
                    leaveRoom();
                }
            });

            unsubscribeMessages = db.collection('rooms').doc(roomId).collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot(snapshot => {
                    const container = document.getElementById('chat-messages');
                    container.innerHTML = '';
                    
                    snapshot.forEach(doc => {
                        const msg = doc.data();
                        const isMe = msg.senderId === currentUser.uid;
                        
                        const block = document.createElement('div');
                        block.className = `msg-block ${isMe ? 'me' : 'other'}`;
                        block.dataset.id = doc.id;
                        block.dataset.sender = msg.senderId;
                        block.dataset.text = msg.text;
                        block.dataset.author = msg.senderName;

                        let replyHTML = '';
                        if (msg.replyTo) {
                            replyHTML = `<div class="msg-quoted"><strong>${msg.replyTo.author}:</strong> ${msg.replyTo.text}</div>`;
                        }

                        block.innerHTML = `
                            ${replyHTML}
                            <span class="msg-author">${msg.senderName}</span>
                            <span class="msg-text">${msg.text}</span>
                            <span class="msg-time">${msg.timestamp ? new Date(msg.timestamp.toMillis()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                        `;

                        block.addEventListener('click', (e) => openMessageMenu(e, block));
                        container.appendChild(block);
                    });
                    container.scrollTop = container.scrollHeight;
                });
        }

        function leaveRoom() {
            if (unsubscribeMessages) unsubscribeMessages();
            if (unsubscribeRoom) unsubscribeRoom();
            currentRoomId = null;
            loadRoomsScreen();
        }
        document.getElementById('btn-leave-room').addEventListener('click', leaveRoom);

        document.getElementById('btn-send').addEventListener('click', sendTextMessage);
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendTextMessage(); });

        async function sendTextMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !currentRoomId) return;

            const msgPayload = {
                senderId: currentUser.uid,
                senderName: currentUser.customName,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (replyMessageData) {
                msgPayload.replyTo = replyMessageData;
                cancelReply();
            }

            await db.collection('rooms').doc(currentRoomId).collection('messages').add(msgPayload);
            input.value = '';
        }

        function openMessageMenu(e, block) {
            selectedMessageId = block.dataset.id;
            const senderId = block.dataset.sender;
            const text = block.dataset.text;
            const author = block.dataset.author;

            const isMe = senderId === currentUser.uid;
            const isAmIAdmin = currentUser.uid === currentRoomAdmin;

            const menu = document.getElementById('message-menu');
            
            document.getElementById('menu-edit').style.display = isMe ? 'block' : 'none';
            document.getElementById('menu-delete').style.display = (isMe || isAmIAdmin) ? 'block' : 'none';

            menu.style.display = 'flex';

            document.getElementById('menu-reply').onclick = () => {
                replyMessageData = { id: selectedMessageId, text: text, author: author };
                document.getElementById('reply-user').innerText = author;
                document.getElementById('reply-text').innerText = text;
                document.getElementById('reply-preview').style.display = 'flex';
                menu.style.display = 'none';
            };

            document.getElementById('menu-edit').onclick = async () => {
                const newText = prompt("Edite sua mensagem:", text);
                if (newText && newText.trim() !== "") {
                    await db.collection('rooms').doc(currentRoomId).collection('messages').doc(selectedMessageId).update({
                        text: newText.trim() + " (editada)"
                    });
                }
                menu.style.display = 'none';
            };

            document.getElementById('menu-delete').onclick = async () => {
                if (confirm("Deseja apagar essa mensagem para todos?")) {
                    await db.collection('rooms').doc(currentRoomId).collection('messages').doc(selectedMessageId).delete();
                }
                menu.style.display = 'none';
            };
        }

        function cancelReply() {
            replyMessageData = null;
            document.getElementById('reply-preview').style.display = 'none';
        }
        document.getElementById('btn-cancel-reply').addEventListener('click', cancelReply);
        document.getElementById('menu-cancel').addEventListener('click', () => { document.getElementById('message-menu').style.display = 'none'; });

        const profileModal = document.getElementById('modal-profile');
        const openProfileTrigger = (imgId) => {
            document.getElementById(imgId).addEventListener('click', () => {
                document.getElementById('modal-user-img').src = currentUser.photoURL || '';
                document.getElementById('modal-user-name').innerText = currentUser.customName;
                document.getElementById('modal-user-email').innerText = currentUser.email;
                profileModal.style.display = 'flex';
            });
        };
        openProfileTrigger('user-avatar-rooms');
        openProfileTrigger('user-avatar-chat');

        document.getElementById('close-profile').addEventListener('click', () => profileModal.style.display = 'none');
        document.getElementById('btn-logout').addEventListener('click', () => { 
            localStorage.removeItem('chat_display_name');
            auth.signOut(); 
            profileModal.style.display = 'none'; 
        });

        document.getElementById('btn-toggle-theme').addEventListener('click', () => {
            if (document.body.classList.contains('theme-dark')) {
                document.body.classList.replace('theme-dark', 'theme-light');
            } else {
                document.body.classList.replace('theme-light', 'theme-dark');
            }
        });

        const roomModal = document.getElementById('modal-room');
        document.getElementById('btn-room-details').addEventListener('click', async () => {
            const roomDoc = await db.collection('rooms').doc(currentRoomId).get();
            if (!roomDoc.exists) return;
            const roomData = roomDoc.data();

            document.getElementById('info-room-name').innerText = `Sala: ${roomData.name.toUpperCase()}`;
            
            const isAmIAdmin = currentUser.uid === currentRoomAdmin;
            document.getElementById('adm-controls').style.display = isAmIAdmin ? 'block' : 'none';

            const pList = document.getElementById('participants-list');
            pList.innerHTML = '';
            
            Object.keys(roomData.participants).forEach(uid => {
                const name = roomData.participants[uid];
                const row = document.createElement('div');
                row.className = 'participant-row';
                row.innerHTML = `
                    <span>${name} ${uid === roomData.admin ? '<strong>(ADM)</strong>' : ''}</span>
                    ${(isAmIAdmin && uid !== currentUser.uid) ? `<button class="btn-danger" style="width:auto; padding:4px 8px; margin:0;" onclick="kickUser('${uid}')">Remover</button>` : ''}
                `;
                pList.appendChild(row);
            });

            roomModal.style.display = 'flex';
        });

        document.getElementById('close-room').addEventListener('click', () => roomModal.style.display = 'none');

        window.kickUser = async function(uidTarget) {
            if (confirm("Tem certeza que deseja remover este participante?")) {
                let updateData = {};
                updateData[`participants.${uidTarget}`] = firebase.firestore.FieldValue.delete();
                await db.collection('rooms').doc(currentRoomId).update(updateData);
                alert('Participante removido!');
                roomModal.style.display = 'none';
            }
        };

        document.getElementById('btn-rename-room').addEventListener('click', async () => {
            const newName = document.getElementById('new-room-name').value.trim().toLowerCase();
            if (!newName) return alert('Insira um nome válido!');
            await db.collection('rooms').doc(currentRoomId).update({ name: newName });
            alert('Nome alteredo com sucesso!');
            roomModal.style.display = 'none';
        });

        document.getElementById('btn-clear-chat').addEventListener('click', async () => {
            if (confirm("ATENÇÃO: Deseja apagar permanentemente todas as mensagens desta sala?")) {
                const messagesSnapshot = await db.collection('rooms').doc(currentRoomId).collection('messages').get();
                const batch = db.batch();
                messagesSnapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                alert('Histórico de conversas limpo!');
                roomModal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
