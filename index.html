<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chat Family</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
    :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); --primary: #7C4DFF; --bg: #0a0a0a; --surface: #161616; --text: #E0E0E0; --text-dim: #888888; --border: #222222; }
    body, html { width: 100%; height: 100%; background-color: var(--bg); color: var(--text); overflow: hidden; position: fixed; }
    #app { display: flex; flex-direction: column; width: 100%; height: 100%; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
    .screen { display: flex; flex-direction: column; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 24px; z-index: 100; background: var(--bg); }
    h1 { margin-bottom: 24px; font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(45deg, #BB86FC, #7C4DFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .input-field { width: 100%; max-width: 320px; padding: 14px 20px; border: 1px solid var(--border); border-radius: 25px; margin-bottom: 16px; font-size: 1rem; text-align: center; outline: none; background-color: var(--surface); color: var(--text); }
    .btn-main { width: 100%; max-width: 320px; padding: 14px; border: none; border-radius: 25px; background: linear-gradient(90deg, #7C4DFF, #6200EE); color: white; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    #chat-screen { display: none; flex-direction: column; flex: 1; height: 100%; }
    header { background-color: var(--surface); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    header .title-text { font-weight: 600; font-size: 1.1rem; }
    .avatar-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); cursor: pointer; border: 2px solid var(--border); object-fit: cover; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
    .msg { max-width: 75%; padding: 8px 12px 20px 12px; border-radius: 16px; font-size: 0.95rem; line-height: 1.4; position: relative; word-wrap: break-word; }
    .msg .sender { font-size: 0.75rem; font-weight: 600; margin-bottom: 2px; color: #BB86FC !important; display: block; }
    .msg .timestamp { position: absolute; bottom: 4px; right: 10px; font-size: 0.65rem; color: var(--text-dim); }
    .msg.received { background-color: var(--surface); align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.sent { background-color: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.sent .sender { color: #fff !important; }
    .msg.sent .timestamp { color: rgba(255,255,255,0.7); }
    .msg-system { align-self: center; font-size: 0.8rem; color: var(--text-dim); font-style: italic; background: transparent; padding: 0; }
    .file-message { display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
    .img-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 10px; }
    .btn-download { background: rgba(255, 255, 255, 0.1); color: inherit; border: none; padding: 6px; border-radius: 8px; font-size: 0.75rem; text-align: center; text-decoration: none; display: block; margin-top: 4px; }
    audio { width: 100%; height: 30px; margin-top: 4px; }
    .input-area { display: flex; padding: 12px; background-color: var(--surface); border-top: 1px solid var(--border); align-items: center; gap: 8px; }
    .input-area input[type="text"] { flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 20px; outline: none; font-size: 1rem; background-color: var(--bg); color: var(--text); }
    .action-btn { background: none; border: none; width: 38px; height: 38px; color: var(--text); display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .action-btn svg { width: 22px; height: 22px; fill: currentColor; }
    #btn-send { display: none; color: var(--primary); }
    #btn-mic { color: #E53935; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; -khtml-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
    #btn-mic.recording { animation: pulse 1s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
    .modal-content { background: var(--surface); width: 100%; max-width: 300px; border-radius: 20px; padding: 20px; border: 1px solid var(--border); text-align: center; display: flex; flex-direction: column; gap: 14px; }
    .profile-img { width: 70px; height: 70px; border-radius: 50%; margin: 0 auto; border: 2px solid var(--primary); object-fit: cover; }
    .profile-info { font-size: 0.9rem; color: var(--text-dim); }
    .switch-container { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; margin: 6px 0; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .3s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>

  <div id="app">
    <div id="lock-screen" class="screen" style="display: none;">
      <h1>App Bloqueado</h1>
      <input type="password" id="lock-pin" class="input-field" placeholder="Digite seu PIN" pattern="\d*" inputmode="numeric">
      <button id="btn-unlock" class="btn-main">Acessar</button>
    </div>

    <div id="login-screen" class="screen" style="display: none;">
      <h1>Chat Family</h1>
      <input type="text" id="username" class="input-field" placeholder="Seu nome" maxlength="15" autocomplete="off">
      <button id="btn-google-login" class="btn-main">
        <svg style="width:18px; height:18px; fill:currentColor" viewBox="0 0 24 24"><path d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-10.997 0-.746-.08-1.32-.176-1.883H12.24z"/></svg>
        Entrar com Google
      </button>
    </div>

    <div id="chat-screen">
      <header>
        <div class="title-text">Família</div>
        <img src="" id="btn-profile" class="avatar-btn" alt="Perfil" style="display: none;">
      </header>
      
      <div id="messages"></div>

      <div class="input-area">
        <button class="action-btn" id="btn-attach">
          <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-3.31 2.69-6 6-6s6 2.69 6 6v11.5c0 4.42-3.58 8-8 8s-8-3.58-8-8V6h2v11.5c0 3.31 2.69 6 6 6s6-2.69 6-6V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 1.1.9 2 2 2s2-.9 2-2V6h2z"/></svg>
        </button>
        <input type="file" id="file-input" style="display: none;" accept="image/*,audio/*,video/*,application/pdf">
        <input type="text" id="msg-input" placeholder="Mensagem..." autocomplete="off">
        <button class="action-btn" id="btn-send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
        <button class="action-btn" id="btn-mic">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="modal" id="profile-modal">
    <div class="modal-content" style="position: relative;">
      <img src="" id="modal-photo" class="profile-img">
      <div id="modal-email" class="profile-info" style="font-size:0.8rem;">email@gmail.com</div>
      
      <input type="text" id="settings-username" class="input-field" placeholder="Seu Nome" style="margin-bottom:0;">
      
      <div class="switch-container">
        <span>Bloquear App</span>
        <label class="switch">
          <input type="checkbox" id="chk-lock">
          <span class="slider"></span>
        </label>
      </div>
      
      <button class="btn-main" id="btn-save-settings" style="background:#4CAF50;">Salvar</button>
      <button class="btn-main" id="btn-logout" style="background:#E53935;">Sair</button>
    </div>
  </div>

  <div class="modal" id="pin-modal">
    <div class="modal-content">
      <h3>Definir PIN</h3>
      <p style="font-size:0.8rem; color:var(--text-dim)">Digite apenas números</p>
      <input type="password" id="new-pin-input" class="input-field" pattern="\d*" inputmode="numeric" placeholder="Novo PIN">
      <button class="btn-main" id="btn-pin-confirm">Confirmar</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
      authDomain: "teuzin-apps.firebaseapp.com",
      databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
      projectId: "teuzin-apps",
      storageBucket: "teuzin-apps.firebasestorage.app",
      messagingSenderId: "695505471506",
      appId: "1:695505471506:web:efe322e605af4a30bfb0cb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginScreen = document.getElementById("login-screen");
    const lockScreen = document.getElementById("lock-screen");
    const chatScreen = document.getElementById("chat-screen");
    const usernameInput = document.getElementById("username");
    const msgInput = document.getElementById("msg-input");
    const btnSend = document.getElementById("btn-send");
    const btnMic = document.getElementById("btn-mic");
    const messagesContainer = document.getElementById("messages");
    
    const btnProfile = document.getElementById("btn-profile");
    const profileModal = document.getElementById("profile-modal");
    const modalPhoto = document.getElementById("modal-photo");
    const modalEmail = document.getElementById("modal-email");
    const settingsUsername = document.getElementById("settings-username");
    const chkLock = document.getElementById("chk-lock");
    
    const lockPin = document.getElementById("lock-pin");
    const pinModal = document.getElementById("pin-modal");
    const newPinInput = document.getElementById("new-pin-input");

    let currentUser = null;
    let customDisplayName = localStorage.getItem("chat_family_custom_name") || "";
    let mediaRecorder = null;
    let audioChunks = [];

    const isLockEnabled = localStorage.getItem("chat_family_lock_enabled") === "true";
    if (isLockEnabled) {
      lockScreen.style.display = "flex";
      chatScreen.style.display = "none";
      loginScreen.style.display = "none";
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        if (!customDisplayName) customDisplayName = user.displayName || "Membro";
        
        btnProfile.src = user.photoURL || "https://www.gravatar.com/avatar/?d=mp";
        btnProfile.style.display = "block";
        
        if (!isLockEnabled) {
          lockScreen.style.display = "none";
          loginScreen.style.display = "none";
          chatScreen.style.display = "flex";
          initChat();
        }
      } else {
        if (!isLockEnabled) {
          loginScreen.style.display = "flex";
          chatScreen.style.display = "none";
        }
      }
    });

    document.getElementById("btn-google-login").addEventListener("click", () => {
      const nameTyped = usernameInput.value.trim();
      if (!nameTyped) {
        alert("Por favor, digite seu nome primeiro!");
        return;
      }
      customDisplayName = nameTyped;
      localStorage.setItem("chat_family_custom_name", nameTyped);
      
      signInWithPopup(auth, provider).catch(err => alert("Erro ao fazer login: " + err.message));
    });

    document.getElementById("btn-unlock").addEventListener("click", () => {
      if (lockPin.value === localStorage.getItem("chat_family_pin")) {
        lockScreen.style.display = "none";
        if (auth.currentUser) {
          chatScreen.style.display = "flex";
          initChat();
        } else {
          loginScreen.style.display = "flex";
        }
      } else {
        alert("PIN incorreto!");
        lockPin.value = "";
      }
    });

    window.addEventListener("click", (e) => {
      if (e.target === profileModal) profileModal.style.display = "none";
      if (e.target === pinModal) {
        pinModal.style.display = "none";
        chkLock.checked = localStorage.getItem("chat_family_lock_enabled") === "true";
      }
    });

    btnProfile.addEventListener("click", () => {
      if (!currentUser) return;
      modalPhoto.src = currentUser.photoURL || "https://www.gravatar.com/avatar/?d=mp";
      modalEmail.textContent = currentUser.email;
      settingsUsername.value = customDisplayName;
      chkLock.checked = localStorage.getItem("chat_family_lock_enabled") === "true";
      profileModal.style.display = "flex";
    });

    document.getElementById("btn-save-settings").addEventListener("click", () => {
      if (settingsUsername.value.trim()) {
        customDisplayName = settingsUsername.value.trim();
        localStorage.setItem("chat_family_custom_name", customDisplayName);
      }
      profileModal.style.display = "none";
    });

    document.getElementById("btn-logout").addEventListener("click", () => {
      signOut(auth).then(() => {
        localStorage.removeItem("chat_family_custom_name");
        profileModal.style.display = "none";
        window.location.reload();
      });
    });

    chkLock.addEventListener("change", () => {
      if (chkLock.checked) {
        if (localStorage.getItem("chat_family_lock_enabled") !== "true") {
          newPinInput.value = "";
          pinModal.style.display = "flex";
        }
      } else {
        localStorage.setItem("chat_family_lock_enabled", "false");
      }
    });

    document.getElementById("btn-pin-confirm").addEventListener("click", () => {
      const pin = newPinInput.value.replace(/\D/g, "");
      if (pin.length > 0) {
        localStorage.setItem("chat_family_pin", pin);
        localStorage.setItem("chat_family_lock_enabled", "true");
        pinModal.style.display = "none";
      } else {
        alert("Insira apenas números.");
        chkLock.checked = false;
        pinModal.style.display = "none";
      }
    });

    msgInput.addEventListener("input", () => {
      if (msgInput.value.trim().length > 0) {
        btnSend.style.display = "flex";
        btnMic.style.display = "none";
      } else {
        btnSend.style.display = "none";
        btnMic.style.display = "flex";
      }
    });

    const btnAttach = document.getElementById("btn-attach");
    const fileInput = document.getElementById("file-input");
    btnAttach.addEventListener("click", () => fileInput.click());
    
    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        let fileType = "file";
        if (file.type.startsWith("audio/")) fileType = "audio";
        else if (file.type.startsWith("image/")) fileType = "image";

        push(ref(db, "messages"), {
          sender: customDisplayName,
          text: file.name,
          fileData: e.target.result,
          fileName: file.name,
          type: fileType,
          timestamp: Date.now()
        });
        fileInput.value = "";
      };
      reader.readAsDataURL(file);
    });

    async function startAudioRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = () => {
            push(ref(db, "messages"), {
              sender: customDisplayName,
              text: "Áudio",
              fileData: reader.result,
              fileName: "audio.webm",
              type: "audio",
              timestamp: Date.now()
            });
          };
          reader.readAsDataURL(audioBlob);
          stream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        btnMic.classList.add("recording");
      } catch (err) { alert("Sem permissão ao microfone."); }
    }

    function stopAudioRecording() {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        btnMic.classList.remove("recording");
      }
    }

    btnMic.addEventListener("touchstart", (e) => { e.preventDefault(); startAudioRecording(); });
    btnMic.addEventListener("touchend", (e) => { e.preventDefault(); stopAudioRecording(); });
    btnMic.addEventListener("contextmenu", (e) => { e.preventDefault(); });

    btnMic.addEventListener("mousedown", startAudioRecording);
    btnMic.addEventListener("mouseup", stopAudioRecording);

    function initChat() {
      const messagesRef = ref(db, "messages");

      btnSend.onclick = () => {
        const text = msgInput.value.trim();
        if (text) {
          push(messagesRef, {
            sender: customDisplayName,
            text: text,
            type: "text",
            timestamp: Date.now()
          });
          msgInput.value = "";
          btnSend.style.display = "none";
          btnMic.style.display = "flex";
        }
      };

      msgInput.onkeypress = (e) => { if (e.key === "Enter") btnSend.click(); };

      onValue(messagesRef, (snapshot) => {
        messagesContainer.innerHTML = "";
        const data = snapshot.val();
        if (data) {
          Object.keys(data).forEach(id => renderMessage(data[id]));
        }
      });
    }

    function renderMessage(data) {
      const msgDiv = document.createElement("div");
      const isMe = data.sender === customDisplayName;
      
      msgDiv.classList.add("msg", isMe ? "sent" : "received");
      
      const senderSpan = document.createElement("span");
      senderSpan.classList.add("sender");
      senderSpan.textContent = isMe ? "Você" : data.sender;
      msgDiv.appendChild(senderSpan);

      const d = new Date(data.timestamp);
      const timeStr = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
      const timeSpan = document.createElement("span");
      timeSpan.classList.add("timestamp");
      timeSpan.textContent = timeStr;
      msgDiv.appendChild(timeSpan);

      if (data.type === "image") {
        const box = document.createElement("div");
        box.classList.add("file-message");
        box.innerHTML = `<img class="img-preview" src="${data.fileData}">`;
        const dl = document.createElement("a");
        dl.classList.add("btn-download");
        dl.href = data.fileData;
        dl.download = data.fileName;
        dl.textContent = "Baixar Foto";
        box.appendChild(dl);
        msgDiv.appendChild(box);
      } else if (data.type === "file") {
        const box = document.createElement("div");
        box.classList.add("file-message");
        box.style.fontSize = "0.85rem";
        box.textContent = data.fileName;
        const dl = document.createElement("a");
        dl.classList.add("btn-download");
        dl.href = data.fileData;
        dl.download = data.fileName;
        dl.textContent = "Baixar Arquivo";
        box.appendChild(dl);
        msgDiv.appendChild(box);
      } else if (data.type === "audio") {
        const box = document.createElement("div");
        const au = document.createElement("audio");
        au.controls = true;
        au.src = data.fileData;
        box.appendChild(au);
        msgDiv.appendChild(box);
      } else {
        const txt = document.createElement("div");
        txt.textContent = data.text;
        msgDiv.appendChild(txt);
      }

      messagesContainer.appendChild(msgDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
  </script>
</body>
</html>
